<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luka's Game</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⭐</text></svg>">
    <style>
        html, body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            width: 100%; 
            height: 100%;
            /* Use dvh to account for Safari's moving bars */
            height: 100dvh; 
            position: fixed; 
            touch-action: none;
            /* Ensures no "notch" gaps on iPhone */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        
        /* Layer 1: The Three.js World (Hidden initially) */
        #three-layer {
            position: absolute; top: 0; left: 0; 
            width: 100vw; height: 100vh;
            opacity: 0; 
            transition: opacity 2s ease-in-out;
            z-index: 1;
        }
        #three-layer canvas { 
            image-rendering: pixelated; 
            width: 100vw !important; 
            height: 100vh !important;
            display: block;
        }

        /* Layer 2: The ASCII Interface */
       #ascii-layer {
            position: absolute; 
            top: 0; left: 0;
            width: 100%; 
            height: 100dvh;
            display: block; /* Removed flex centering to prevent gaps */
            z-index: 2;
            background: #000;
        }
        
        #ascii-canvas { cursor: crosshair; }
        #ascii-canvas { 
            width: 100% !important; 
            height: 100% !important; 
            display: block;
            object-fit: cover; /* Stretches slightly to ensure no black edges */
        }

        /* UI Layer */
        #ui {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: white; /* Plain white text */
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            letter-spacing: 2px;
            pointer-events: none;
            transition: opacity 2s;
            opacity: 0;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <audio id="gameMusic" loop>
    <source src="your-music-file.mp3" type="audio/mpeg">
</audio>

    <div id="three-layer"></div>
    
    <div id="ascii-layer">
        <canvas id="ascii-canvas"></canvas>
    </div>

    <div id="ui">WASD TO MOVE | SPACE TO JUMP</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script>

        const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // If on mobile, hide the prompts so it's just pure ASCII art
if (isMobileDevice) {
    window.addEventListener('DOMContentLoaded', () => {
        const prompt = document.getElementById('click-prompt');
        if (prompt) prompt.style.display = 'none';
        
        // We also hide the WASD instructions since they can't play
        const ui = document.getElementById('ui');
        if (ui) ui.style.display = 'none';
    });
}

        
      const canvas = document.getElementById('ascii-canvas');
        const ctx = canvas.getContext('2d');
        
        const thinChars = [".", "·", "′", "`", "⁚", "⁝", "ι", "!", "¡", "i", "l", "¦", "°", "¹"]; 
        const smudgeChars = ["@", "#", "8", "&", "W", "M", "B", "R", "N", "Q", "0", "G", "E", "X", "K", "A", "U", "V", "y", "x", "z", "/", "\\", "(", ")", "[", "]", "{", "}", "1", "?", "+", "~", "i", "l", "v", "u", "c", ":", ",", "."];
        const boldChars = ["█", "▓", "▒", "░", "■"];
        
        let cellW = 12, cellH = 17, fontSize = 18;
        let cols, rows, heatGrid, smudgeGrid, mask, visibleGrid;
        let mouse = { x: -100, y: -100, lastX: -100, lastY: -100, vx: 0, vy: 0 };
        let currentRotation = 0, colorPhase = 0;

        let isFalling = false;
        let fallOffsets, fallVelocities, fallDelays, fallJitter;
        window.worldActive = false;

        // --- LIQUID ASCII SIMULATION STATE (Stable Fluids grid) ---
        // Grid-based Eulerian fluid (Jos Stam's "Stable Fluids").
        // No particles: a density field is advected on a regular grid,
        // with a velocity field projected to divergence-free each step.
        // ASCII renderer just samples the density field — like
        // "dithering" the fluid into characters.
        let fluidMode = false;
        let fluidMousePx = -9999, fluidMousePy = -9999;
        let fluidMouseLastPx = -9999, fluidMouseLastPy = -9999;
        let fluidCursorVx = 0, fluidCursorVy = 0;
        let fluidLastFrame = 0;
        let fluid = null;              // grid state, allocated on start

        const FLUID_N             = 80;     // grid columns (rows derived from aspect)
        const FLUID_PROJ_ITERS    = 15;     // pressure relaxation passes
        const FLUID_GRAVITY       = 2.2;    // scales the density × down-force (lower = more viscous fall)
        const FLUID_VISCOSITY     = 0.0002; // velocity diffusion. 0 ≈ water; ~0.001+ feels like oil/honey
        const FLUID_VISC_ITERS    = 4;      // gauss-seidel passes for the viscosity diffuse step
        const FLUID_VEL_FRICTION  = 1.1;    // global per-second velocity decay → fluid actually settles
        const FLUID_DECAY         = 0.998;  // slow density dissipation to stop drift
        const FLUID_FILL_HEIGHT   = 0.42;   // bottom fraction that starts as water
        const FLUID_CURSOR_R      = 5.5;    // cursor push radius in grid cells
        const FLUID_CURSOR_FORCE  = 0.7;    // how strongly cursor drags fluid (0..1)
        const FLUID_DENSITY_FLOOR = 0.42;   // below this, render as empty (raised → sharper meniscus, no stray mist)

        // ASCII ramp — tiered instead of a single linear array. Density
        // picks WHICH tier (denser cells → heavier glyphs); a per-cell
        // stable hash picks WHICH glyph inside that tier. So adjacent
        // cells of similar density don't all render as the same character —
        // you get a textured "alphabet soup" surface instead of horizontal
        // stripes of `:` and `-`. Glyphs intentionally chosen to match the
        // pre-click PLAY palette (smudgeChars / thinChars / boldChars).
        const FLUID_CHAR_TIERS = [
            [" "],                                   //  0: empty (skipped via DENSITY_FLOOR)
            ["·", "'", "`", "′", ".", ","],          //  1: faint mist
            [":", ";", "ι", "*", "¹"],               //  2: spray
            ["-", "_", "~", "°"],                    //  3: surface ripples
            ["+", "=", "x", "*"],                    //  4: light flow
            ["i", "l", "1", "/", "\\"],              //  5: thin streams
            ["c", "v", "u", "n", "z", "y"],          //  6: medium-light
            ["o", "e", "s", "a", "t"],               //  7: medium body
            ["O", "0", "Q", "C", "G", "D", "U"],     //  8: heavy
            ["#", "%", "&", "$", "X", "K", "A", "8"],//  9: very heavy
            ["█", "▓", "▒", "@", "M", "W", "B", "N"] // 10: water core
        ];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.floor(canvas.width / cellW); 
            rows = Math.floor(canvas.height / cellH);
            
            heatGrid = new Float32Array(cols * rows);
            smudgeGrid = new Float32Array(cols * rows);
            visibleGrid = new Uint8Array(cols * rows); 
            fallOffsets = new Float32Array(cols * rows);
            fallVelocities = new Float32Array(cols * rows);
            fallDelays = new Float32Array(cols * rows);
            fallJitter = new Float32Array(cols * rows);

            for(let i = 0; i < cols * rows; i++) {
                // Wide range of delays creates the "crumbling" stagger
                fallDelays[i] = Math.random() * 80; 
                fallJitter[i] = (Math.random() - 0.5) * 4;
            }
            
            const mCanvas = document.createElement('canvas');
            const mCtx = mCanvas.getContext('2d');
            mCanvas.width = cols; mCanvas.height = rows;
            mCtx.fillStyle = "black"; mCtx.fillRect(0, 0, cols, rows);
            mCtx.fillStyle = "white";
            let maskFontSize = Math.floor(cols / 2.8); 
            mCtx.font = `900 ${maskFontSize}px "Times New Roman", serif`;
            mCtx.textAlign = "center"; mCtx.textBaseline = "middle"; 
if (isMobileDevice) {
            // MOBILE: Fill the entire canvas with white 
            // This makes the whole screen a grid of characters
            mCtx.fillStyle = "white";
            mCtx.fillRect(0, 0, cols, rows);
        } else {
            // DESKTOP: Only draw the word "PLAY" in white
            mCtx.fillStyle = "white";
            let maskFontSize = Math.floor(cols / 2.8); 
            mCtx.font = `900 ${maskFontSize}px "Times New Roman", serif`;
            mCtx.textAlign = "center"; 
            mCtx.textBaseline = "middle"; 
            mCtx.fillText("PLAY", cols / 2, (rows / 2) + (rows * 0.05));
        }

            mask = mCtx.getImageData(0, 0, cols, rows).data;
        }

        window.addEventListener('mousemove', (e) => {
            // Always track pixel coords — the fluid sim needs continuous
            // positions even during the crumble/fall sequence.
            fluidMousePx = e.clientX;
            fluidMousePy = e.clientY;
            if (isFalling) return; 
            mouse.x = (e.clientX / window.innerWidth) * cols;
            mouse.y = (e.clientY / window.innerHeight) * rows;
            mouse.vx = mouse.x - mouse.lastX;
            mouse.vy = mouse.y - mouse.lastY;
        });

        canvas.addEventListener('click', (e) => {

            if (isFalling || fluidMode) return;

            // Shift+Click: drop the PLAY letters into a liquid ASCII sim
            // instead of booting into the 3D world. Pure easter egg — does
            // NOT start the game, does NOT play music, does NOT lock camera.
            if (e.shiftKey) {
                startFluidMode();
                return;
            }

            {

                const music = document.getElementById('gameMusic');
            if (music) {
                music.volume = 0.3; // Sets volume to 30%
                music.play().catch(e => console.log("Audio waiting for user interaction"));
            }
                if (window.lockCamera) window.lockCamera();

                const time = Date.now() * 0.0003;
                for (let y = 0; y < rows; y++) {
                    for (let x = 0; x < cols; x++) {
                        const idx = y * cols + x;
                        const offsetX = Math.floor(Math.sin(y * 0.2 + time * 4) * 1.1);
                        const offsetY = Math.floor(Math.cos(x * 0.2 + time * 3) * 0.8);
                        const lookupX = Math.min(cols - 1, Math.max(0, x + offsetX));
                        const lookupY = Math.min(rows - 1, Math.max(0, y + offsetY));

                        if (mask[(lookupY * cols + lookupX) * 4] > 128) {
                            visibleGrid[idx] = 1;
                            // Small pop for the "crumble" start
                            fallVelocities[idx] = -Math.random() * 3;
                        }
                    }
                }
                isFalling = true;
                setTimeout(() => {
                    document.getElementById('three-layer').style.opacity = '1';
                    document.getElementById('ui').style.opacity = '0.8';
                    document.getElementById('ascii-layer').style.opacity = '0';
                    window.worldActive = true;
                    setTimeout(() => { document.getElementById('ascii-layer').style.display = 'none'; }, 2000);
                }, 4000);
            }
        });

        function animate() {
            if (document.getElementById('ascii-layer').style.display === 'none') return; 

            // --- FLUID MODE: short-circuit the PLAY render loop ---
            // Once shift+click has happened, we stop drawing the swirling
            // "PLAY" text entirely and just run the particle sim instead.
            if (fluidMode) {
                const now = performance.now();
                let dt = (now - fluidLastFrame) / 1000;
                if (dt > 0.05) dt = 0.05;    // clamp big gaps (tab refocus)
                if (dt < 0)    dt = 0;
                fluidLastFrame = now;

                // Keep the rainbow cycle advancing at the same rate PLAY
                // used — the fluid inherits PLAY's running color phase so
                // the shift-click transition is visually seamless.
                colorPhase += 0.2;

                // Cursor velocity — adds drag/stir to nearby particles
                fluidCursorVx = fluidMousePx - fluidMouseLastPx;
                fluidCursorVy = fluidMousePy - fluidMouseLastPy;
                fluidMouseLastPx = fluidMousePx;
                fluidMouseLastPy = fluidMousePy;

                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = `bold ${fontSize}px monospace`;
                ctx.textAlign = "left";
                ctx.textBaseline = "top";

                // Stam Stable Fluids runs the full sim in one step —
                // no need for substepping or dt-stashing.
                updateFluid(dt);
                renderFluid();

                requestAnimationFrame(animate);
                return;
            }

            const time = Date.now() * 0.0003; 
            colorPhase += 0.2;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = `bold ${fontSize}px monospace`;
            ctx.textAlign = "left"; ctx.textBaseline = "top";

            const speed = Math.sqrt(mouse.vx**2 + mouse.vy**2);
            if (speed > 0.1) currentRotation += (Math.atan2(mouse.vy, mouse.vx) - currentRotation) * 0.1;
            else currentRotation += 0.01;

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const idx = y * cols + x;
                    let isVisible = false;

                    if (isFalling) {
                        isVisible = visibleGrid[idx] === 1;
                    } else {
                        const offsetX = Math.floor(Math.sin(y * 0.2 + time * 4) * 1.1);
                        const offsetY = Math.floor(Math.cos(x * 0.2 + time * 3) * 0.8);
                        const lookupX = Math.min(cols - 1, Math.max(0, x + offsetX));
                        const lookupY = Math.min(rows - 1, Math.max(0, y + offsetY));
                        isVisible = mask[(lookupY * cols + lookupX) * 4] > 128;
                    }

                    if (isVisible) {
                        if (!isFalling) {
                            const dx = x - mouse.x, dy = y - mouse.y;
                            const dist = Math.sqrt(dx*dx + dy*dy);
                            const angle = Math.atan2(dy, dx) - currentRotation;
                            const starShape = 0.3 + 0.7 * Math.pow(Math.abs(Math.cos(angle * 2.5)), 4);
                            const starEffect = Math.max(0, (1 - dist / 10) * starShape); 
                            const rippleEffect = Math.sin(dist * 0.45 - time * 18) * Math.max(0, 1 - dist / 60);
                            const totalInfluence = (starEffect * 0.8) + (rippleEffect * 0.4);

                            if (totalInfluence > 0.05) {
                                smudgeGrid[idx] += (totalInfluence - smudgeGrid[idx]) * 0.2;
                                if (dist < 1.1) heatGrid[idx] = 1.0;
                            }
                        }

                        heatGrid[idx] *= 0.2; 
                        smudgeGrid[idx] *= 0.94; 

                        let drawY = y * cellH;
                        let drawX = x * cellW;

                        if (isFalling) {
                            if (fallDelays[idx] > 0) {
                                fallDelays[idx]--;
                                // Keep the wavy movement even while waiting to crumble
                                const offsetX = Math.sin(y * 0.2 + time * 4) * 1.1;
                                drawX += offsetX * cellW * 0.1;
                            } else {
                                fallVelocities[idx] += 0.85; // Heavier gravity
                                fallOffsets[idx] += fallVelocities[idx];
                                // Stochastic jitter instead of drift
                                drawX += Math.sin(fallOffsets[idx] * 0.05) * fallJitter[idx];
                            }
                            drawY += fallOffsets[idx];
                        }

                        if (drawY > canvas.height + cellH) continue; 
                        
                        const h = heatGrid[idx], s = smudgeGrid[idx];
                        const w1 = Math.sin(x * 0.09 + y * 0.045 + time * 2);
                        const w2 = Math.cos(x * 0.04 - y * 0.075 + time * 1.5);
                        const combinedWave = (w1 + w2) / 2;
                        const shimmer = Math.pow(Math.max(0, Math.sin(x * 0.5 + y * 0.3 + time * 8)), 10) * 40;

                        const baseHue = (0 + colorPhase) % 360; 
                        const hue = baseHue + (s * 60) + (combinedWave * 10);
                        let distForLight = isFalling ? 100 : Math.sqrt(Math.pow(x - mouse.x, 2) + Math.pow(y - mouse.y, 2));
                        const lightness = 30 + (s * 75) + (h * 40) + (combinedWave * 10) + shimmer + (Math.max(0, (1 - distForLight / 15)) * 40);
                        
                        let char = "";
                        if (isFalling && fallOffsets[idx] > 10) {
                            // Degrade characters into smaller bits as they fall
                            const crumbChars = ["·", "′", ".", "`", " "];
                            char = crumbChars[Math.floor(Math.random() * crumbChars.length)];
                        } else if (h > 0.9) {
                            char = boldChars[Math.floor(Math.random() * boldChars.length)];
                        } else if (s > 0.15) {
                            const sIdx = Math.floor((1 - s) * (smudgeChars.length - 1));
                            char = smudgeChars[Math.max(0, Math.min(smudgeChars.length - 1, sIdx))];
                        } else {
                            char = thinChars[Math.floor(((combinedWave + 1) / 2) * (thinChars.length - 1))];
                        }
                        
                        ctx.fillStyle = `hsl(${hue}, 80%, ${Math.min(100, lightness)}%)`;
                        ctx.fillText(char, drawX, drawY);
                    }
                }
            }
            if (!isFalling) { mouse.lastX = mouse.x; mouse.lastY = mouse.y; }
            requestAnimationFrame(animate);
        }

        // =============================================================
        //   LIQUID ASCII — Stam's Stable Fluids (compact)
        // =============================================================
        // Grid of size (N+2)×(M+2) (including boundary ring). All fields
        // stored as flat Float32Arrays indexed by IX(i,j) = i + (N+2)*j.
        // `d` is density (1 = water, 0 = air), `u/v` are velocity.
        // Per frame: add gravity to v, add cursor force, project, advect
        // velocity, project again, advect density.

        function IX(i, j) { return i + (fluid.N + 2) * j; }

        function setBnd(b, x) {
            const { N, M } = fluid;
            for (let i = 1; i <= N; i++) {
                x[IX(i, 0)]     = b === 2 ? -x[IX(i, 1)] : x[IX(i, 1)];
                x[IX(i, M + 1)] = b === 2 ? -x[IX(i, M)] : x[IX(i, M)];
            }
            for (let j = 1; j <= M; j++) {
                x[IX(0, j)]     = b === 1 ? -x[IX(1, j)] : x[IX(1, j)];
                x[IX(N + 1, j)] = b === 1 ? -x[IX(N, j)] : x[IX(N, j)];
            }
        }

        function project() {
            const { N, M, u, v, p, div } = fluid;
            const hInv = 1 / N;
            for (let j = 1; j <= M; j++) for (let i = 1; i <= N; i++) {
                div[IX(i, j)] = -0.5 * hInv *
                    (u[IX(i + 1, j)] - u[IX(i - 1, j)] +
                     v[IX(i, j + 1)] - v[IX(i, j - 1)]);
                p[IX(i, j)] = 0;
            }
            setBnd(0, div); setBnd(0, p);
            for (let k = 0; k < FLUID_PROJ_ITERS; k++) {
                for (let j = 1; j <= M; j++) for (let i = 1; i <= N; i++) {
                    p[IX(i, j)] = (div[IX(i, j)] +
                        p[IX(i - 1, j)] + p[IX(i + 1, j)] +
                        p[IX(i, j - 1)] + p[IX(i, j + 1)]) * 0.25;
                }
                setBnd(0, p);
            }
            for (let j = 1; j <= M; j++) for (let i = 1; i <= N; i++) {
                u[IX(i, j)] -= 0.5 * N * (p[IX(i + 1, j)] - p[IX(i - 1, j)]);
                v[IX(i, j)] -= 0.5 * N * (p[IX(i, j + 1)] - p[IX(i, j - 1)]);
            }
            setBnd(1, u); setBnd(2, v);
        }

        function advect(b, dst, src, uu, vv, dt) {
            const { N, M } = fluid;
            const dt0 = dt * N;
            for (let j = 1; j <= M; j++) for (let i = 1; i <= N; i++) {
                let x = i - dt0 * uu[IX(i, j)];
                let y = j - dt0 * vv[IX(i, j)];
                if (x < 0.5) x = 0.5; else if (x > N + 0.5) x = N + 0.5;
                if (y < 0.5) y = 0.5; else if (y > M + 0.5) y = M + 0.5;
                const i0 = x | 0, i1 = i0 + 1;
                const j0 = y | 0, j1 = j0 + 1;
                const s1 = x - i0, s0 = 1 - s1;
                const t1 = y - j0, t0 = 1 - t1;
                dst[IX(i, j)] =
                    s0 * (t0 * src[IX(i0, j0)] + t1 * src[IX(i0, j1)]) +
                    s1 * (t0 * src[IX(i1, j0)] + t1 * src[IX(i1, j1)]);
            }
            setBnd(b, dst);
        }

        // Viscosity diffusion via Gauss-Seidel — same shape as the pressure
        // solve in project(). Each cell pulls toward the average of its 4
        // neighbours, weighted by `a = dt * visc * N * M`. Higher viscosity
        // (or longer dt) → bigger `a` → more smoothing per step → fluid
        // resists shear and feels heavier. This is the step that turns
        // water into honey.
        function diffuse(b, dst, src, visc, dt) {
            const { N, M } = fluid;
            const a = dt * visc * N * M;
            const inv = 1 / (1 + 4 * a);
            for (let k = 0; k < FLUID_VISC_ITERS; k++) {
                for (let j = 1; j <= M; j++) for (let i = 1; i <= N; i++) {
                    dst[IX(i, j)] = (src[IX(i, j)] + a * (
                        dst[IX(i - 1, j)] + dst[IX(i + 1, j)] +
                        dst[IX(i, j - 1)] + dst[IX(i, j + 1)]
                    )) * inv;
                }
                setBnd(b, dst);
            }
        }

        function startFluidMode() {
            const W = canvas.width, H = canvas.height;
            const N = FLUID_N;
            const M = Math.max(4, Math.round(N * H / W));
            const size = (N + 2) * (M + 2);
            fluid = {
                N, M, size, W, H,
                u:     new Float32Array(size), v:     new Float32Array(size),
                uPrev: new Float32Array(size), vPrev: new Float32Array(size),
                d:     new Float32Array(size), dPrev: new Float32Array(size),
                p:     new Float32Array(size), div:   new Float32Array(size),
            };

            // Pre-fill bottom FLUID_FILL_HEIGHT of the tank with water.
            const fillTopRow = Math.max(1, Math.floor(M * (1 - FLUID_FILL_HEIGHT)) + 1);
            for (let j = fillTopRow; j <= M; j++)
                for (let i = 1; i <= N; i++)
                    fluid.d[IX(i, j)] = 1.0;

            // "Splash" density at every currently-visible PLAY cell — the
            // letters dissolve into water that falls and merges with the
            // pool. Matches the swirl offset the PLAY renderer uses so
            // the visual transition is continuous.
            const time = Date.now() * 0.0003;
            for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) {
                const offX = Math.floor(Math.sin(y * 0.2 + time * 4) * 1.1);
                const offY = Math.floor(Math.cos(x * 0.2 + time * 3) * 0.8);
                const lx = Math.min(cols - 1, Math.max(0, x + offX));
                const ly = Math.min(rows - 1, Math.max(0, y + offY));
                if (mask[(ly * cols + lx) * 4] > 128) {
                    const gi = Math.min(N, Math.max(1, 1 + ((x / cols) * N) | 0));
                    const gj = Math.min(M, Math.max(1, 1 + ((y / rows) * M) | 0));
                    fluid.d[IX(gi, gj)] = 1.0;
                }
            }

            fluidMode = true;
            fluidLastFrame = performance.now();
            fluidMouseLastPx = fluidMousePx;
            fluidMouseLastPy = fluidMousePy;
            const ui = document.getElementById('ui');
            if (ui) ui.style.display = 'none';
        }

        function updateFluid(dt) {
            if (!fluid) return;
            const { N, M, u, v, d, uPrev, vPrev, dPrev, W, H } = fluid;

            // 1. Gravity — proportional to density so only "water" falls.
            for (let j = 1; j <= M; j++) for (let i = 1; i <= N; i++) {

            //    fluid radially OUTWARD from the cursor center, with a

                const r = FLUID_CURSOR_R;
                const r2 = r * r;
                const PUSH_SPEED = 9;  // radial outward speed (grid-cells/s)

                const iMin = Math.max(1, (cx - r) | 0);
                const iMax = Math.min(N, ((cx + r) | 0) + 1);
                const jMin = Math.max(1, (cy - r) | 0);
                const jMax = Math.min(M, ((cy + r) | 0) + 1);

                for (let j = jMin; j <= jMax; j++) for (let i = iMin; i <= iMax; i++) {

                    const dd2 = dx * dx + dy * dy;

                    const fall = 1 - dd / r;

                    // (a) Carve: reduce density inside the disc so a
                    //     visible hole forms. The pool top-up slowly
                    //     refills this, so the hole fades when the
                    //     cursor leaves.

                    // (b) Push fluid radially OUTWARD — this is what
                    //     makes the cursor feel solid. Waves ripple out.

                        const outY = dy / dd;
                        u[k] += outX * PUSH_SPEED * fall;
                        v[k] += outY * PUSH_SPEED * fall;
                    }

                    //     fast swipes create a visible streak. Light
                    //     enough it doesn't turn into a wake-lift.

                    v[k] += dVY * fall * FLUID_CURSOR_FORCE * 0.25;

            }

            //    Adding a viscosity diffuse before the standard Stam pass
            //    is what makes the fluid resist shear instead of jiggling

            //    propagate too fast and the surface never settles.

            diffuse(2, v, vPrev, FLUID_VISCOSITY, dt);

            advect(1, u, uPrev, uPrev, vPrev, dt);
            advect(2, v, vPrev, uPrev, vPrev, dt);
            project();

            // 4. Density step: just advect (no diffusion = crisp free surface).
            dPrev.set(d);
            advect(0, d, dPrev, u, v, dt);

            // 4.5. Velocity friction. Acts like drag — viscous fluids
            //      don't keep sloshing forever after you poke them.
            //      Without this the surface jiggles indefinitely; with it,
            //      the pool returns to flat in ~half a second.

            //    at the water/air interface every frame (bilinear smears
            //    it into the air cells, where it then "escapes"). Without
            //    this top-up the whole pool evaporates in ~3 seconds.

            //    carve visible cavities; they just slowly refill, which
            //    reads as a bathtub settling.

            //    density into air cells along the water/air interface

            //    pull down quickly (gravity scales with density), so

                            (d[IX(i, j - 1)] >= FLUID_DENSITY_FLOOR ? 1 : 0) +

            const MAX_TIER = 9;

        // ── BROADLEAF TREES (tree2) ──

        (function spawnTree2() {

                    if (n.isMesh) {
                        const geo = n.geometry.clone();
                        geo.applyMatrix4(n.matrixWorld);
                        geo.computeBoundingBox();
                        overallBB.union(geo.boundingBox);
                        subs.push({ geometry: geo, material: n.material });

                });

                const offX = -(overallBB.min.x + overallBB.max.x) * 0.5;
                const offY = -overallBB.min.y;
                const offZ = -(overallBB.min.z + overallBB.max.z) * 0.5;
                for (const s of subs) s.geometry.translate(offX, offY, offZ);
                const height = overallBB.max.y - overallBB.min.y;

                        r: worldH * 0.03,
                        minY: gy,
                        maxY: gy + worldH
                    });

                    im.receiveShadow = true;

        // ── GRASS TUFTS ──
        // low_poly_grass_pack.glb: 4 tuft variants under RootNode (Circle.018/.015/.012/.005).
        // Raw heights ≈ 2.7 / 7.0 / 11.1 / 8.3 units. Models' min.y is ~-1.6, so tufts
        // embed naturally if we sit the origin on the terrain (no lift needed).
        // Uses InstancedMesh per template — cloning ~15k individual meshes would
        // tank framerate; instancing draws each template in a single call.
        (function spawnGrass() {
            const loader = new GLTFLoader();
            loader.load('assets/low_poly_grass_pack.glb', gltf => {
                // Parent nodes in Sketchfab-exported FBX glTFs carry a Z-up → Y-up
                // rotation AND a per-mesh scale/rotation. Cloning just the geometry
                // (like rocks do) skips all that and leaves tufts sideways. Fix:
                // bake each mesh's full world matrix into its cloned geometry, then
                // re-center in X/Z with the base at y=0 so placement code is simple.
                gltf.scene.updateMatrixWorld(true);
                const templates = [];
                gltf.scene.traverse(n => {
                    if (n.isMesh) {
                        const geo = n.geometry.clone();
                        geo.applyMatrix4(n.matrixWorld);
                        geo.computeBoundingBox();
                        const bb = geo.boundingBox;
                        geo.translate(
                            -(bb.min.x + bb.max.x) * 0.5,   // centre X on origin
                            -bb.min.y,                       // base sits at y=0
                            -(bb.min.z + bb.max.z) * 0.5    // centre Z on origin
                        );
                        const h = bb.max.y - bb.min.y;
                        templates.push({ geometry: geo, material: n.material, height: h });
                    }
                });
                if (templates.length === 0) { console.warn('No grass meshes'); return; }

                function tooClose(vx, vz) {
                    return Math.sqrt((vx-sX)**2 + (vz-sZ)**2) < 2600;
                }

                // Accumulate target matrices per template, then build one InstancedMesh each
                const buckets = templates.map(() => []);
                const dummy = new THREE.Object3D();

                const CLUSTER_COUNT = 5200;
                for (let i = 0; i < CLUSTER_COUNT; i++) {
                    const cx = (rnd()-0.5) * 108000;
                    const cz = (rnd()-0.5) * 108000;
                    if (tooClose(cx, cz)) continue;

                    const tuftCount     = 8 + Math.floor(rnd() * 16);   // 8–23 tufts per patch
                    const clusterRadius = 90 + rnd() * 260;             // patch size
                    for (let j = 0; j < tuftCount; j++) {
                        const a  = rnd() * Math.PI * 2;
                        // Sqrt of rnd gives denser centers, natural dropoff toward edges
                        const r  = Math.sqrt(rnd()) * clusterRadius;
                        const gx = cx + Math.cos(a) * r;
                        const gz = cz + Math.sin(a) * r;
                        const gy = getElevation(gx, gz);

                        const tIdx    = Math.floor(rnd() * templates.length);
                        const targetH = 24 + rnd() * 40;                // 24–64 world units tall
                        const sc      = targetH / templates[tIdx].height;

                        // Sink ~3 units so roots are below terrain, no floating tufts
                        dummy.position.set(gx, gy - 3, gz);
                        dummy.rotation.set(0, rnd() * Math.PI * 2, 0);
                        dummy.scale.setScalar(sc);
                        dummy.updateMatrix();
                        buckets[tIdx].push(dummy.matrix.clone());
                    }
                }

                let total = 0;
                for (let t = 0; t < templates.length; t++) {
                    const bucket = buckets[t];
                    if (bucket.length === 0) continue;
                    const mat = templates[t].material.clone();
                    mat.side = THREE.DoubleSide;   // grass cards need to render from both sides
                    const im = new THREE.InstancedMesh(templates[t].geometry, mat, bucket.length);
                    im.receiveShadow = true;
                    im.castShadow = false;         // grass shadows would be expensive & noisy
                    im.frustumCulled = false;       // instances span whole world; skip per-instance culling
                    for (let i = 0; i < bucket.length; i++) im.setMatrixAt(i, bucket[i]);
                    im.instanceMatrix.needsUpdate = true;
                    scene.add(im);
                    total += bucket.length;
                }
                console.log('Grass spawned:', total, 'tufts across', templates.length, 'variants');
            }, undefined, e => console.warn('Grass GLB not found:', e));
        })();

        // ── 70 STYLIZED ROCKS ──
        // Pack contains 70 separate rocks positioned at different XYZ in the shared
        // vertex space (like a Blender grid layout). On load, we extract each mesh
        // and re-centre its geometry around origin so we can place each one correctly.
        (function spawn70Rocks() {
            const loader = new GLTFLoader();
            loader.load('assets/70_stylized_rocks.glb', gltf => {
                const templates = [];
                
                // Walk the scene in order — the pack is sorted smallest to biggest,
                // so the array index tells us each rock's relative size.
                const rawNodes = [];
                gltf.scene.traverse(node => {
                    if (node.isMesh && node.name && node.name.startsWith('Object_')) {
                        rawNodes.push(node);
                    }
                });
                // Sort by the numeric suffix in the name to ensure correct size order
                rawNodes.sort((a, b) => {
                    const na = parseInt(a.name.split('_')[1]);
                    const nb = parseInt(b.name.split('_')[1]);
                    return na - nb;
                });

                rawNodes.forEach(node => {
                    const geo = node.geometry.clone();
                    geo.computeBoundingBox();
                    const box = geo.boundingBox;
                    const cx = (box.min.x + box.max.x) * 0.5;
                    const cy = (box.min.y + box.max.y) * 0.5;
                    const cz = (box.min.z + box.max.z) * 0.5;
                    geo.translate(-cx, -cy, -cz);
                    geo.computeBoundingBox();
                    templates.push({
                        geometry: geo,
                        material: node.material,
                        baseY: geo.boundingBox.min.y,
                        height: geo.boundingBox.max.y - geo.boundingBox.min.y
                    });
                });
                
                console.log('Loaded', templates.length, 'rock templates from 70-pack');
                if (templates.length === 0) return;
                
                // Templates are sorted smallest→biggest (70 total). Per
                // user request we now ONLY use the 10 BIGGEST types — the
                // small ones added thousands of barely-visible pebbles
                // that tanked perf without contributing to the silhouette.
                function pickBig() { return templates[60 + Math.floor(rnd() * 10)]; }

                function placeRock(wx, wy, wz, worldH, tmpl) {
                    tmpl = tmpl || pickBig();
                    const sc = worldH / tmpl.height;
                    const m = new THREE.Mesh(tmpl.geometry, tmpl.material);
                    m.scale.setScalar(sc);
                    m.rotation.y = rnd() * Math.PI * 2;

                    // Sample terrain at 4 points around rock footprint — use LOWEST.
                    // Then sink rocks a bit so they look settled, not perched on tiptoes.
                    const r = worldH * 0.35;
                    const gy1 = getElevation(wx + r, wz);

            const size = 256;

            const ctx = canvas.getContext('2d');
            const cx = size / 2, cy = size / 2;
            const r = size * 0.36;            // leaves room for halo outside disc

            // Soft outer halo
            const halo = ctx.createRadialGradient(cx, cy, r * 0.95, cx, cy, size * 0.5);
            halo.addColorStop(0.0, 'rgba(220, 230, 255, 0.35)');
            halo.addColorStop(0.35, 'rgba(190, 205, 240, 0.12)');

            ctx.fillStyle = halo;
            ctx.fillRect(0, 0, size, size);

            // Main disc with gentle limb darkening + off-centre highlight
            const disc = ctx.createRadialGradient(cx - r * 0.25, cy - r * 0.25, r * 0.05, cx, cy, r);
            disc.addColorStop(0.00, '#fefdf5');
            disc.addColorStop(0.55, '#ebe8dc');
            disc.addColorStop(0.88, '#c8c3b2');
            disc.addColorStop(1.00, '#a8a395');
            ctx.fillStyle = disc;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();

            // Clip subsequent details to the disc
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.clip();

            // Craters — soft darker circles at hand-picked positions
            const craters = [
                { x:  0.25, y:  0.32, r: 0.14 },
                { x: -0.18, y: -0.22, r: 0.09 },
                { x: -0.32, y:  0.10, r: 0.16 },

                { x: -0.40, y: -0.08, r: 0.05 },

            for (const c of craters) {
                const ccx = cx + c.x * r;
                const ccy = cy + c.y * r;
                const cr  = c.r * r;
                const g = ctx.createRadialGradient(ccx, ccy, 0, ccx, ccy, cr);

            }

            ctx.restore();
            return new THREE.CanvasTexture(canvas);

        function collidesAt(tx, tz) {
            const fy = camera.position.y - USER_HEIGHT;
            const hy = camera.position.y;
            for (const obs of obstacles) {
                if (obs.type === 'cylinder') {
                    if (hy <= obs.minY || fy >= obs.maxY) continue;
                    const dx = tx - obs.cx, dz = tz - obs.cz;
                    if (dx*dx + dz*dz < (obs.r + PR) * (obs.r + PR)) return true;
                } else if (obs.type === 'ellipsoid') {
                    // Skip if player is clearly above or below the rock's AABB
                    if (fy >= obs.aabb.max.y || hy <= obs.aabb.min.y) continue;
                    // Broad-phase: skip if player center is obviously far from rock center
                    const bdx = tx - obs.center.x, bdz = tz - obs.center.z;
                    const maxR = Math.max(obs.rx, obs.ry, obs.rz) + PR;
                    if (bdx*bdx + bdz*bdz > maxR*maxR) continue;
                    // Transform player into rock's local space, then ellipsoid test
                    _pLocal.set(tx, camera.position.y - USER_HEIGHT * 0.5, tz);
                    _pLocal.applyMatrix4(obs.invMatrix);
                    const ex = _pLocal.x / obs.rx;
                    const ey = _pLocal.y / obs.ry;
                    const ez = _pLocal.z / obs.rz;
                    if (ex*ex + ey*ey + ez*ez < 1.0) return true;
                } else {
                    const b = obs.box;
                    if (hy <= b.min.y || fy >= b.max.y) continue;
                    if (tx > b.min.x - PR && tx < b.max.x + PR &&

            hazeCol:    new THREE.Color(0xffceaa),
            sunGlow:    new THREE.Color(0xffd8a8),
            sunCore:    new THREE.Color(0xffffff),
            starOp:     0.0,
            moonOp:     0.0
        };

        // Scratch objects reused every frame (no per-frame allocations)
        function makePal() {
            return {
                skyTop: new THREE.Color(), skyMid: new THREE.Color(), skyBottom: new THREE.Color(),
                sunCol: new THREE.Color(), hemiSky: new THREE.Color(), hemiGround: new THREE.Color(),
                fogCol: new THREE.Color(), hazeCol: new THREE.Color(),
                sunGlow: new THREE.Color(), sunCore: new THREE.Color(),
                sunInt: 0, hemiInt: 0, starOp: 0, moonOp: 0
            };
        }
        const _palA = makePal();
        const _palOut = makePal();

        function lerpPal(a, b, t, out) {
            out.skyTop.lerpColors(a.skyTop, b.skyTop, t);
            out.skyMid.lerpColors(a.skyMid, b.skyMid, t);
            out.skyBottom.lerpColors(a.skyBottom, b.skyBottom, t);
            out.sunCol.lerpColors(a.sunCol, b.sunCol, t);
            out.hemiSky.lerpColors(a.hemiSky, b.hemiSky, t);
            out.hemiGround.lerpColors(a.hemiGround, b.hemiGround, t);
            out.fogCol.lerpColors(a.fogCol, b.fogCol, t);
            out.hazeCol.lerpColors(a.hazeCol, b.hazeCol, t);
            out.sunGlow.lerpColors(a.sunGlow, b.sunGlow, t);
            out.sunCore.lerpColors(a.sunCore, b.sunCore, t);
            out.sunInt  = a.sunInt  + (b.sunInt  - a.sunInt)  * t;
            out.hemiInt = a.hemiInt + (b.hemiInt - a.hemiInt) * t;
            out.starOp  = a.starOp  + (b.starOp  - a.starOp)  * t;
            out.moonOp  = a.moonOp  + (b.moonOp  - a.moonOp)  * t;
        }

        function updateTimeOfDay(time) {
            // Linear phase advances at constant rate; angle gets the warp.
            const linearPhase = ((time / DAY_DURATION) + START_PHASE) % 1.0;
            const angle = linearPhase * 2 * Math.PI - Math.PI / 2
                        + WARP_AMOUNT * Math.sin(4 * Math.PI * linearPhase);
            const elev = Math.sin(angle);   // −1 midnight, 0 horizon, +1 noon
            const azim = Math.cos(angle);   // +1 east (dawn), −1 west (dusk)

            // Sun direction: traces an east-overhead-west arc with a slight
            // north tilt so the light isn't perfectly axis-aligned.
            SUN_DIR.set(azim * 0.95, elev, -0.3).normalize();

            // Two-stage blend: night → golden → day, keyed off elevation.
            const t1 = smoothstepTOD(-0.22, 0.05, elev); // night → golden
            const t2 = smoothstepTOD( 0.05, 0.45, elev); // golden → day
            lerpPal(TOD_NIGHT, TOD_GOLDEN, t1, _palA);
            lerpPal(_palA, TOD_DAY, t2, _palOut);

            // Apply to sky, fog, haze
            skyMat.uniforms.topColor.value.copy(_palOut.skyTop);
            skyMat.uniforms.midColor.value.copy(_palOut.skyMid);
            skyMat.uniforms.bottomColor.value.copy(_palOut.skyBottom);
            scene.fog.color.copy(_palOut.fogCol);
            hazeMat.uniforms.glowColor.value.copy(_palOut.hazeCol);
            // hazeMat.uniforms.sunDir already references SUN_DIR, so the
            // mutation above propagates automatically.

            // Apply to lights
            sunLight.color.copy(_palOut.sunCol);
            sunLight.intensity = _palOut.sunInt;
            hemiLight.color.copy(_palOut.hemiSky);
            hemiLight.groundColor.copy(_palOut.hemiGround);
            hemiLight.intensity = _palOut.hemiInt;

            // Apply to sun disc and stars/moon
            sunMat.uniforms.glowColor.value.copy(_palOut.sunGlow);
            sunMat.uniforms.coreColor.value.copy(_palOut.sunCore);
            starMaterial.opacity = _palOut.starOp;
            moon.material.opacity = _palOut.moonOp;
            // Halo rides on top of the moon's opacity curve, but a bit
            // steeper — it should almost fully fade out even in dusk/dawn
            // golden hour, then pop at full night.
            moonHalo.material.opacity = _palOut.moonOp * _palOut.moonOp * 0.9;

            // Lantern: at night it's genuinely your light source. The knot
            // itself stays the original subtle brightness — over-cooking
            // its emissive just makes it look like a disco ball and doesn't
            // actually illuminate the ground. Instead we push the
            // PointLight's DISTANCE hard, so the inverse-square falloff
            // reaches much further across the terrain.
            const nightness = 1.0 - smoothstepTOD(-0.05, 0.25, elev);
            const baseLantern = 40000 + nightness * 220000;
            const flicker = Math.random() * (3000 + nightness * 12000) - (1500 + nightness * 6000);
            lanternLight.intensity = baseLantern + flicker;
            lanternLight.distance  = 6000 + nightness * 16000;   // up to ~22000 units at full night
            lanternCore.material.emissiveIntensity = 8 + nightness * 22;

            // Sun disc shrinks when high in the sky (real atmospheres make
            // the sun *look* bigger near the horizon for optical/illusion
            // reasons — matching that feel reads as "overhead sun is
            // smaller" without actually touching horizon sizing).
            // elev = 0 → 1.00x scale, elev = 1 (noon) → 0.70x.
            const sunScale = 1.0 - Math.max(0, elev) * 0.30;
            sunMesh.scale.set(sunScale, sunScale, 1);
        }

        
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Update Shader Times
            moteMat.uniforms.uTime.value = time;
            if (asciiPillarMat) asciiPillarMat.uniforms.uTime.value = time;

            // Advance day/night cycle (sun direction, sky, lights, fog, haze)
            updateTimeOfDay(time);

          if (controls.isLocked) {
                // --- INPUT DIRECTION (normalized-ish: -1 / 0 / +1 per axis) ---
                let inFwd = 0, inStrafe = 0;
                if (keys.w || keys.arrowup)    inFwd    += 1;
                if (keys.s || keys.arrowdown)  inFwd    -= 1;
                if (keys.d || keys.arrowright) inStrafe += 1;
                if (keys.a || keys.arrowleft)  inStrafe -= 1;

                // --- CAMERA-RELATIVE HORIZONTAL AXES ---
                // We accelerate along the direction the camera is actually
                // facing, projected to the ground plane.
                camera.getWorldDirection(_fwd);
                _fwd.y = 0;
                if (_fwd.lengthSq() > 1e-6) _fwd.normalize();
                _right.crossVectors(_fwd, _worldUp).normalize();

                // --- PROJECT CURRENT VELOCITY ONTO THOSE AXES ---
                let curFwd    = moveVel.dot(_fwd);
                let curStrafe = moveVel.dot(_right);

                // --- TARGET SPEEDS (asymmetric: fwd > back > strafe) ---
                const targetFwd    = inFwd > 0 ? inFwd * MAX_FORWARD_SPEED
                                  : inFwd < 0 ? inFwd * MAX_BACKWARD_SPEED
                                  : 0;
                const targetStrafe = inStrafe * MAX_STRAFE_SPEED;

                // --- ACCELERATE EACH AXIS SEPARATELY ---
                // If the player is holding a direction, use the accel for
                // that axis; otherwise use the higher decel rate so you
                // actually slow down. Air control lowers both.
                const airMul      = isGrounded ? 1.0 : AIR_CONTROL;
                const accelFwd    = (inFwd    !== 0 ? GROUND_ACCEL_FWD    : GROUND_DECEL) * airMul;
                const accelStrafe = (inStrafe !== 0 ? GROUND_ACCEL_STRAFE : GROUND_DECEL) * airMul;

                curFwd    = approach(curFwd,    targetFwd,    accelFwd    * delta);
                curStrafe = approach(curStrafe, targetStrafe, accelStrafe * delta);

                // --- REBUILD WORLD-SPACE VELOCITY ---
                moveVel.set(0, 0, 0);
                moveVel.addScaledVector(_fwd,   curFwd);
                moveVel.addScaledVector(_right, curStrafe);

                const oldX = camera.position.x;
                const oldZ = camera.position.z;
                camera.position.x += moveVel.x * delta;
                camera.position.z += moveVel.z * delta;

                // --- COLLISION: per-axis resolution enables wall sliding ---
                // Killing the velocity component on a blocked axis stops the
                // player from "pressing into" a wall and storing up speed.
                if (collidesAt(camera.position.x, oldZ)) {
                    camera.position.x = oldX;
                    moveVel.x = 0;
                }
                if (collidesAt(camera.position.x, camera.position.z)) {
                    camera.position.z = oldZ;
                    moveVel.z = 0;
                }

                // Floor — terrain plus any surface we're standing on top of
                let currentFloorY = getElevation(camera.position.x, camera.position.z) + USER_HEIGHT;
                const feetY = camera.position.y - USER_HEIGHT;

                for (const obs of obstacles) {
                    if (obs.type === 'cylinder') {
                        const dx = camera.position.x - obs.cx, dz = camera.position.z - obs.cz;
                        if (dx*dx + dz*dz < (obs.r + PR) * (obs.r + PR)) {
                            if (feetY >= obs.maxY - 5 && feetY <= obs.maxY + 200)
                                currentFloorY = Math.max(currentFloorY, obs.maxY + USER_HEIGHT);
                        }
                    } else if (obs.type === 'ellipsoid') {
                        // Use the precomputed AABB for floor detection — it correctly accounts
                        // for rotation and scale, unlike the local-space math which was double-scaling.
                        const b = obs.aabb;
                        const topY = b.max.y;
                        // Check player is horizontally over the rock (with a little padding)
                        if (camera.position.x > b.min.x - PR && camera.position.x < b.max.x + PR &&
                            camera.position.z > b.min.z - PR && camera.position.z < b.max.z + PR) {
                            // Accept a wide vertical window so fast-falling frames don't tunnel through
                            if (feetY <= topY + 500 && feetY >= topY - 120)
                                currentFloorY = Math.max(currentFloorY, topY + USER_HEIGHT);
                        }
                    } else {
                        const b = obs.box;
                        if (camera.position.x > b.min.x - PR && camera.position.x < b.max.x + PR &&
                            camera.position.z > b.min.z - PR && camera.position.z < b.max.z + PR) {
                            if (feetY >= b.max.y - 5 && feetY <= b.max.y + 200)
                                currentFloorY = Math.max(currentFloorY, b.max.y + USER_HEIGHT);
                        }
                    }
                }
                // --- JUMP (coyote + double) + GRAVITY ---
                // Edge-detect spacebar so one press = one jump attempt,
                // even if the key stays held.
                const jumpPressed = !!keys[" "] && !jumpHeldLastFrame;
                jumpHeldLastFrame = !!keys[" "];

                // Coyote timer always counts down; the floor check below
                // refreshes it whenever the player is actually grounded.
                if (coyoteTimer > 0) coyoteTimer -= delta;

                if (jumpPressed) {
                    if (isGrounded || coyoteTimer > 0) {
                        // Ground jump OR coyote-time jump (just ran off a
                        // ledge within 0.3s). Keep the air-jump available.
                        verticalVelocity   = JUMP_VELOCITY;
                        isGrounded         = false;
                        coyoteTimer        = 0;
                        airJumpsRemaining  = MAX_AIR_JUMPS;
                    } else if (airJumpsRemaining > 0) {
                        // Double jump. Reset vertical velocity so a jump
                        // mid-fall still gives full lift (classic platformer
                        // feel), don't just add to current velocity.
                        verticalVelocity   = DOUBLE_JUMP_VELOCITY;
                        airJumpsRemaining -= 1;
                    }
                }

                verticalVelocity -= 2600 * delta;
                camera.position.y += verticalVelocity * delta;

                if (camera.position.y <= currentFloorY) {
                    camera.position.y = currentFloorY;
                    if (verticalVelocity < 0) verticalVelocity = 0;
                    isGrounded        = true;
                    coyoteTimer       = COYOTE_DURATION;   // refresh while grounded
                    airJumpsRemaining = MAX_AIR_JUMPS;     // refresh while grounded
                } else {
                    isGrounded = false;
                }
                
                // Update Sun/Moon
                const sDist = 35000;
                sunMesh.position.set(camera.position.x + (SUN_DIR.x * sDist), camera.position.y + (SUN_DIR.y * sDist), camera.position.z + (SUN_DIR.z * sDist));
                sunMesh.lookAt(camera.position);
                moon.position.set(camera.position.x - (SUN_DIR.x * sDist), camera.position.y - (SUN_DIR.y * sDist), camera.position.z - (SUN_DIR.z * sDist));
                moonHalo.position.copy(moon.position);
                sunLight.position.copy(sunMesh.position);
                sunLight.target.position.set(camera.position.x, 0, camera.position.z);
            }

            lanternCore.rotation.x = time * 0.5; 
            lanternCore.rotation.y = time * 0.3;
            
            const tP = new THREE.Vector3(
                camera.position.x + Math.cos(time * 0.6) * 150, 
                camera.position.y + (Math.sin(time * 1.5) * 20) + 80, 
                camera.position.z + Math.sin(time * 0.6) * 150
            );
            lanternGroup.position.lerp(tP, 0.04); 
            // lanternLight.intensity is driven by updateTimeOfDay (with flicker + night boost)

            skyMesh.position.copy(camera.position);
            hazeMesh.position.copy(camera.position);

            renderer.render(scene, camera);

            scene.traverse(obj => {
    if(obj.isMesh && obj.material === asciiPillarMat) {
        obj.rotation.y += delta * (obj.userData.rotSpeed || 0.05);
    }
});
        }

      
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth / PIXEL_SCALE, window.innerHeight / PIXEL_SCALE, false); });

        // Hide the WASD instructions after 60 seconds (60000 milliseconds)
        setTimeout(() => {
            const instructions = document.getElementById('ui');
            if (instructions) {
                instructions.style.transition = "opacity 2s ease-in-out";
                instructions.style.opacity = "0";
                
                // Optional: fully remove from layout after fade is done
                setTimeout(() => {
                    instructions.style.display = "none";
                }, 2000);
            }
        }, 45000);

    </script>
</body>
</html>
