<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luka's Game</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⭐</text></svg>">
    <style>
        html, body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            width: 100%; 
            height: 100%;
            /* Use dvh to account for Safari's moving bars */
            height: 100dvh; 
            position: fixed; 
            touch-action: none;
            /* Ensures no "notch" gaps on iPhone */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        
        /* Layer 1: The Three.js World (Hidden initially) */
        #three-layer {
            position: absolute; top: 0; left: 0; 
            width: 100vw; height: 100vh;
            opacity: 0; 
            transition: opacity 2s ease-in-out;
            z-index: 1;
        }
        #three-layer canvas { 
            image-rendering: pixelated; 
            width: 100vw !important; 
            height: 100vh !important;
            display: block;
        }

        /* Layer 2: The ASCII Interface */
       #ascii-layer {
            position: absolute; 
            top: 0; left: 0;
            width: 100%; 
            height: 100dvh;
            display: block; /* Removed flex centering to prevent gaps */
            z-index: 2;
            background: #000;
        }
        
        #ascii-canvas { cursor: crosshair; }
        #ascii-canvas { 
            width: 100% !important; 
            height: 100% !important; 
            display: block;
            object-fit: cover; /* Stretches slightly to ensure no black edges */
        }

        /* UI Layer */
        #ui {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: white; /* Plain white text */
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            letter-spacing: 2px;
            pointer-events: none;
            transition: opacity 2s;
            opacity: 0;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <audio id="gameMusic" loop>
    <source src="your-music-file.mp3" type="audio/mpeg">
</audio>

    <div id="three-layer"></div>
    
    <div id="ascii-layer">
        <canvas id="ascii-canvas"></canvas>
    </div>

    <div id="ui">WASD TO MOVE | SPACE TO JUMP</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script>

        const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // If on mobile, hide the prompts so it's just pure ASCII art
if (isMobileDevice) {
    window.addEventListener('DOMContentLoaded', () => {
        const prompt = document.getElementById('click-prompt');
        if (prompt) prompt.style.display = 'none';
        
        // We also hide the WASD instructions since they can't play
        const ui = document.getElementById('ui');
        if (ui) ui.style.display = 'none';
    });
}

        
      const canvas = document.getElementById('ascii-canvas');
        const ctx = canvas.getContext('2d');
        
        const thinChars = [".", "·", "′", "`", "⁚", "⁝", "ι", "!", "¡", "i", "l", "¦", "°", "¹"]; 
        const smudgeChars = ["@", "#", "8", "&", "W", "M", "B", "R", "N", "Q", "0", "G", "E", "X", "K", "A", "U", "V", "y", "x", "z", "/", "\\", "(", ")", "[", "]", "{", "}", "1", "?", "+", "~", "i", "l", "v", "u", "c", ":", ",", "."];
        const boldChars = ["█", "▓", "▒", "░", "■"];
        
        let cellW = 12, cellH = 17, fontSize = 18;
        let cols, rows, heatGrid, smudgeGrid, mask, visibleGrid;
        let mouse = { x: -100, y: -100, lastX: -100, lastY: -100, vx: 0, vy: 0 };
        let currentRotation = 0, colorPhase = 0;

        let isFalling = false;
        let fallOffsets, fallVelocities, fallDelays, fallJitter;
        window.worldActive = false;

        // --- LIQUID ASCII SIMULATION STATE (Stable Fluids grid) ---
        // Grid-based Eulerian fluid (Jos Stam's "Stable Fluids").
        // No particles: a density field is advected on a regular grid,
        // with a velocity field projected to divergence-free each step.
        // ASCII renderer just samples the density field — like
        // "dithering" the fluid into characters.
        let fluidMode = false;
        let fluidMousePx = -9999, fluidMousePy = -9999;
        let fluidMouseLastPx = -9999, fluidMouseLastPy = -9999;
        let fluidCursorVx = 0, fluidCursorVy = 0;
        let fluidLastFrame = 0;
        let fluid = null;              // grid state, allocated on start

        const FLUID_N             = 80;     // grid columns (rows derived from aspect)
        const FLUID_PROJ_ITERS    = 15;     // pressure relaxation passes
        const FLUID_GRAVITY       = 2.2;    // scales the density × down-force (lower = more viscous fall)
        const FLUID_VISCOSITY     = 0.0002; // velocity diffusion. 0 ≈ water; ~0.001+ feels like oil/honey
        const FLUID_VISC_ITERS    = 4;      // gauss-seidel passes for the viscosity diffuse step
        const FLUID_VEL_FRICTION  = 1.1;    // global per-second velocity decay → fluid actually settles
        const FLUID_DECAY         = 0.998;  // slow density dissipation to stop drift
        const FLUID_FILL_HEIGHT   = 0.42;   // bottom fraction that starts as water
        const FLUID_CURSOR_R      = 5.5;    // cursor push radius in grid cells
        const FLUID_CURSOR_FORCE  = 0.7;    // how strongly cursor drags fluid (0..1)
        const FLUID_DENSITY_FLOOR = 0.42;   // below this, render as empty (raised → sharper meniscus, no stray mist)

        // ASCII ramp — tiered instead of a single linear array. Density
        // picks WHICH tier (denser cells → heavier glyphs); a per-cell
        // stable hash picks WHICH glyph inside that tier. So adjacent
        // cells of similar density don't all render as the same character —
        // you get a textured "alphabet soup" surface instead of horizontal
        // stripes of `:` and `-`. Glyphs intentionally chosen to match the
        // pre-click PLAY palette (smudgeChars / thinChars / boldChars).
        const FLUID_CHAR_TIERS = [
            [" "],                                   //  0: empty (skipped via DENSITY_FLOOR)
            ["·", "'", "`", "′", ".", ","],          //  1: faint mist
            [":", ";", "ι", "*", "¹"],               //  2: spray
            ["-", "_", "~", "°"],                    //  3: surface ripples
            ["+", "=", "x", "*"],                    //  4: light flow
            ["i", "l", "1", "/", "\\"],              //  5: thin streams
            ["c", "v", "u", "n", "z", "y"],          //  6: medium-light
            ["o", "e", "s", "a", "t"],               //  7: medium body
            ["O", "0", "Q", "C", "G", "D", "U"],     //  8: heavy
            ["#", "%", "&", "$", "X", "K", "A", "8"],//  9: very heavy
            ["█", "▓", "▒", "@", "M", "W", "B", "N"] // 10: water core
        ];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.floor(canvas.width / cellW); 
            rows = Math.floor(canvas.height / cellH);
            
            heatGrid = new Float32Array(cols * rows);
            smudgeGrid = new Float32Array(cols * rows);
            visibleGrid = new Uint8Array(cols * rows); 
            fallOffsets = new Float32Array(cols * rows);
            fallVelocities = new Float32Array(cols * rows);
            fallDelays = new Float32Array(cols * rows);
            fallJitter = new Float32Array(cols * rows);

            for(let i = 0; i < cols * rows; i++) {
                // Wide range of delays creates the "crumbling" stagger
                fallDelays[i] = Math.random() * 80; 
                fallJitter[i] = (Math.random() - 0.5) * 4;
            }
            
            const mCanvas = document.createElement('canvas');
            const mCtx = mCanvas.getContext('2d');
            mCanvas.width = cols; mCanvas.height = rows;
            mCtx.fillStyle = "black"; mCtx.fillRect(0, 0, cols, rows);
            mCtx.fillStyle = "white";
            let maskFontSize = Math.floor(cols / 2.8); 
            mCtx.font = `900 ${maskFontSize}px "Times New Roman", serif`;
            mCtx.textAlign = "center"; mCtx.textBaseline = "middle"; 
if (isMobileDevice) {
            // MOBILE: Fill the entire canvas with white 
            // This makes the whole screen a grid of characters
            mCtx.fillStyle = "white";
            mCtx.fillRect(0, 0, cols, rows);
        } else {
            // DESKTOP: Only draw the word "PLAY" in white
            mCtx.fillStyle = "white";
            let maskFontSize = Math.floor(cols / 2.8); 
            mCtx.font = `900 ${maskFontSize}px "Times New Roman", serif`;
            mCtx.textAlign = "center"; 
            mCtx.textBaseline = "middle"; 
            mCtx.fillText("PLAY", cols / 2, (rows / 2) + (rows * 0.05));
        }

            mask = mCtx.getImageData(0, 0, cols, rows).data;
        }

        window.addEventListener('mousemove', (e) => {
            // Always track pixel coords — the fluid sim needs continuous
            // positions even during the crumble/fall sequence.
            fluidMousePx = e.clientX;
            fluidMousePy = e.clientY;
            if (isFalling) return; 
            mouse.x = (e.clientX / window.innerWidth) * cols;
            mouse.y = (e.clientY / window.innerHeight) * rows;
            mouse.vx = mouse.x - mouse.lastX;
            mouse.vy = mouse.y - mouse.lastY;
        });

        canvas.addEventListener('click', (e) => {

            if (isFalling || fluidMode) return;

            // Shift+Click: drop the PLAY letters into a liquid ASCII sim
            // instead of booting into the 3D world. Pure easter egg — does
            // NOT start the game, does NOT play music, does NOT lock camera.
            if (e.shiftKey) {
                startFluidMode();
                return;
            }

            {

                const music = document.getElementById('gameMusic');
            if (music) {
                music.volume = 0.3; // Sets volume to 30%
                music.play().catch(e => console.log("Audio waiting for user interaction"));
            }
                if (window.lockCamera) window.lockCamera();

                const time = Date.now() * 0.0003;
                for (let y = 0; y < rows; y++) {
                    for (let x = 0; x < cols; x++) {
                        const idx = y * cols + x;
                        const offsetX = Math.floor(Math.sin(y * 0.2 + time * 4) * 1.1);
                        const offsetY = Math.floor(Math.cos(x * 0.2 + time * 3) * 0.8);
                        const lookupX = Math.min(cols - 1, Math.max(0, x + offsetX));
                        const lookupY = Math.min(rows - 1, Math.max(0, y + offsetY));

                        if (mask[(lookupY * cols + lookupX) * 4] > 128) {
                            visibleGrid[idx] = 1;
                            // Small pop for the "crumble" start
                            fallVelocities[idx] = -Math.random() * 3;
                        }
                    }
                }
                isFalling = true;
                setTimeout(() => {
                    document.getElementById('three-layer').style.opacity = '1';
                    document.getElementById('ui').style.opacity = '0.8';
                    document.getElementById('ascii-layer').style.opacity = '0';
                    window.worldActive = true;
                    setTimeout(() => { document.getElementById('ascii-layer').style.display = 'none'; }, 2000);
                }, 4000);
            }
        });

        function animate() {
            if (document.getElementById('ascii-layer').style.display === 'none') return; 

            // --- FLUID MODE: short-circuit the PLAY render loop ---
            // Once shift+click has happened, we stop drawing the swirling
            // "PLAY" text entirely and just run the particle sim instead.
            if (fluidMode) {
                const now = performance.now();
                let dt = (now - fluidLastFrame) / 1000;
                if (dt > 0.05) dt = 0.05;    // clamp big gaps (tab refocus)
                if (dt < 0)    dt = 0;
                fluidLastFrame = now;

                // Keep the rainbow cycle advancing at the same rate PLAY
                // used — the fluid inherits PLAY's running color phase so
                // the shift-click transition is visually seamless.
                colorPhase += 0.2;

                // Cursor velocity — adds drag/stir to nearby particles
                fluidCursorVx = fluidMousePx - fluidMouseLastPx;
                fluidCursorVy = fluidMousePy - fluidMouseLastPy;
                fluidMouseLastPx = fluidMousePx;
                fluidMouseLastPy = fluidMousePy;

                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = `bold ${fontSize}px monospace`;
                ctx.textAlign = "left";
                ctx.textBaseline = "top";

                // Stam Stable Fluids runs the full sim in one step —
                // no need for substepping or dt-stashing.
                updateFluid(dt);
                renderFluid();

                requestAnimationFrame(animate);
                return;
            }

            const time = Date.now() * 0.0003; 
            colorPhase += 0.2;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = `bold ${fontSize}px monospace`;
            ctx.textAlign = "left"; ctx.textBaseline = "top";

            const speed = Math.sqrt(mouse.vx**2 + mouse.vy**2);
            if (speed > 0.1) currentRotation += (Math.atan2(mouse.vy, mouse.vx) - currentRotation) * 0.1;
            else currentRotation += 0.01;

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const idx = y * cols + x;
                    let isVisible = false;

                    if (isFalling) {
                        isVisible = visibleGrid[idx] === 1;
                    } else {
                        const offsetX = Math.floor(Math.sin(y * 0.2 + time * 4) * 1.1);
                        const offsetY = Math.floor(Math.cos(x * 0.2 + time * 3) * 0.8);
                        const lookupX = Math.min(cols - 1, Math.max(0, x + offsetX));
                        const lookupY = Math.min(rows - 1, Math.max(0, y + offsetY));
                        isVisible = mask[(lookupY * cols + lookupX) * 4] > 128;
                    }

                    if (isVisible) {
                        if (!isFalling) {
                            const dx = x - mouse.x, dy = y - mouse.y;
                            const dist = Math.sqrt(dx*dx + dy*dy);
                            const angle = Math.atan2(dy, dx) - currentRotation;
                            const starShape = 0.3 + 0.7 * Math.pow(Math.abs(Math.cos(angle * 2.5)), 4);
                            const starEffect = Math.max(0, (1 - dist / 10) * starShape); 
                            const rippleEffect = Math.sin(dist * 0.45 - time * 18) * Math.max(0, 1 - dist / 60);
                            const totalInfluence = (starEffect * 0.8) + (rippleEffect * 0.4);

                            if (totalInfluence > 0.05) {
                                smudgeGrid[idx] += (totalInfluence - smudgeGrid[idx]) * 0.2;
                                if (dist < 1.1) heatGrid[idx] = 1.0;
                            }
                        }

                        heatGrid[idx] *= 0.2; 
                        smudgeGrid[idx] *= 0.94; 

                        let drawY = y * cellH;
                        let drawX = x * cellW;

                        if (isFalling) {
                            if (fallDelays[idx] > 0) {
                                fallDelays[idx]--;
                                // Keep the wavy movement even while waiting to crumble
                                const offsetX = Math.sin(y * 0.2 + time * 4) * 1.1;
                                drawX += offsetX * cellW * 0.1;
                            } else {
                                fallVelocities[idx] += 0.85; // Heavier gravity
                                fallOffsets[idx] += fallVelocities[idx];
                                // Stochastic jitter instead of drift
                                drawX += Math.sin(fallOffsets[idx] * 0.05) * fallJitter[idx];
                            }
                            drawY += fallOffsets[idx];
                        }

                        if (drawY > canvas.height + cellH) continue; 
                        
                        const h = heatGrid[idx], s = smudgeGrid[idx];
                        const w1 = Math.sin(x * 0.09 + y * 0.045 + time * 2);
                        const w2 = Math.cos(x * 0.04 - y * 0.075 + time * 1.5);
                        const combinedWave = (w1 + w2) / 2;
                        const shimmer = Math.pow(Math.max(0, Math.sin(x * 0.5 + y * 0.3 + time * 8)), 10) * 40;

                        const baseHue = (0 + colorPhase) % 360; 
                        const hue = baseHue + (s * 60) + (combinedWave * 10);
                        let distForLight = isFalling ? 100 : Math.sqrt(Math.pow(x - mouse.x, 2) + Math.pow(y - mouse.y, 2));
                        const lightness = 30 + (s * 75) + (h * 40) + (combinedWave * 10) + shimmer + (Math.max(0, (1 - distForLight / 15)) * 40);
                        
                        let char = "";
                        if (isFalling && fallOffsets[idx] > 10) {
                            // Degrade characters into smaller bits as they fall
                            const crumbChars = ["·", "′", ".", "`", " "];
                            char = crumbChars[Math.floor(Math.random() * crumbChars.length)];
                        } else if (h > 0.9) {
                            char = boldChars[Math.floor(Math.random() * boldChars.length)];
                        } else if (s > 0.15) {
                            const sIdx = Math.floor((1 - s) * (smudgeChars.length - 1));
                            char = smudgeChars[Math.max(0, Math.min(smudgeChars.length - 1, sIdx))];
                        } else {
                            char = thinChars[Math.floor(((combinedWave + 1) / 2) * (thinChars.length - 1))];
                        }
                        
                        ctx.fillStyle = `hsl(${hue}, 80%, ${Math.min(100, lightness)}%)`;
                        ctx.fillText(char, drawX, drawY);
                    }
                }
            }
            if (!isFalling) { mouse.lastX = mouse.x; mouse.lastY = mouse.y; }
            requestAnimationFrame(animate);
        }

        // =============================================================
        //   LIQUID ASCII — Stam's Stable Fluids (compact)
        // =============================================================
        // Grid of size (N+2)×(M+2) (including boundary ring). All fields
        // stored as flat Float32Arrays indexed by IX(i,j) = i + (N+2)*j.
        // `d` is density (1 = water, 0 = air), `u/v` are velocity.
        // Per frame: add gravity to v, add cursor force, project, advect
        // velocity, project again, advect density.

        function IX(i, j) { return i + (fluid.N + 2) * j; }

        function setBnd(b, x) {
            const { N, M } = fluid;
            for (let i = 1; i <= N; i++) {
                x[IX(i, 0)]     = b === 2 ? -x[IX(i, 1)] : x[IX(i, 1)];
                x[IX(i, M + 1)] = b === 2 ? -x[IX(i, M)] : x[IX(i, M)];
            }
            for (let j = 1; j <= M; j++) {
                x[IX(0, j)]     = b === 1 ? -x[IX(1, j)] : x[IX(1, j)];
                x[IX(N + 1, j)] = b === 1 ? -x[IX(N, j)] : x[IX(N, j)];
            }
        }

        function project() {
            const { N, M, u, v, p, div } = fluid;
            const hInv = 1 / N;
            for (let j = 1; j <= M; j++) for (let i = 1; i <= N; i++) {
                div[IX(i, j)] = -0.5 * hInv *
                    (u[IX(i + 1, j)] - u[IX(i - 1, j)] +
                     v[IX(i, j + 1)] - v[IX(i, j - 1)]);
                p[IX(i, j)] = 0;
            }
            setBnd(0, div); setBnd(0, p);
            for (let k = 0; k < FLUID_PROJ_ITERS; k++) {
                for (let j = 1; j <= M; j++) for (let i = 1; i <= N; i++) {
                    p[IX(i, j)] = (div[IX(i, j)] +
                        p[IX(i - 1, j)] + p[IX(i + 1, j)] +
                        p[IX(i, j - 1)] + p[IX(i, j + 1)]) * 0.25;
                }
                setBnd(0, p);
            }
            for (let j = 1; j <= M; j++) for (let i = 1; i <= N; i++) {
                u[IX(i, j)] -= 0.5 * N * (p[IX(i + 1, j)] - p[IX(i - 1, j)]);
                v[IX(i, j)] -= 0.5 * N * (p[IX(i, j + 1)] - p[IX(i, j - 1)]);
            }
            setBnd(1, u); setBnd(2, v);
        }

        function advect(b, dst, src, uu, vv, dt) {
            const { N, M } = fluid;
            const dt0 = dt * N;
            for (let j = 1; j <= M; j++) for (let i = 1; i <= N; i++) {
                let x = i - dt0 * uu[IX(i, j)];
                let y = j - dt0 * vv[IX(i, j)];
                if (x < 0.5) x = 0.5; else if (x > N + 0.5) x = N + 0.5;
                if (y < 0.5) y = 0.5; else if (y > M + 0.5) y = M + 0.5;
                const i0 = x | 0, i1 = i0 + 1;
                const j0 = y | 0, j1 = j0 + 1;
                const s1 = x - i0, s0 = 1 - s1;
                const t1 = y - j0, t0 = 1 - t1;
                dst[IX(i, j)] =
                    s0 * (t0 * src[IX(i0, j0)] + t1 * src[IX(i0, j1)]) +
                    s1 * (t0 * src[IX(i1, j0)] + t1 * src[IX(i1, j1)]);
            }
            setBnd(b, dst);
        }

        // Viscosity diffusion via Gauss-Seidel — same shape as the pressure
        // solve in project(). Each cell pulls toward the average of its 4
        // neighbours, weighted by `a = dt * visc * N * M`. Higher viscosity
        // (or longer dt) → bigger `a` → more smoothing per step → fluid
        // resists shear and feels heavier. This is the step that turns
        // water into honey.
        function diffuse(b, dst, src, visc, dt) {
            const { N, M } = fluid;
            const a = dt * visc * N * M;
            const inv = 1 / (1 + 4 * a);
            for (let k = 0; k < FLUID_VISC_ITERS; k++) {
                for (let j = 1; j <= M; j++) for (let i = 1; i <= N; i++) {
                    dst[IX(i, j)] = (src[IX(i, j)] + a * (
                        dst[IX(i - 1, j)] + dst[IX(i + 1, j)] +
                        dst[IX(i, j - 1)] + dst[IX(i, j + 1)]
                    )) * inv;
                }
                setBnd(b, dst);
            }
        }

        function startFluidMode() {
            const W = canvas.width, H = canvas.height;
            const N = FLUID_N;
            const M = Math.max(4, Math.round(N * H / W));
            const size = (N + 2) * (M + 2);
            fluid = {
                N, M, size, W, H,
                u:     new Float32Array(size), v:     new Float32Array(size),
                uPrev: new Float32Array(size), vPrev: new Float32Array(size),
                d:     new Float32Array(size), dPrev: new Float32Array(size),
                p:     new Float32Array(size), div:   new Float32Array(size),
            };

            // Pre-fill bottom FLUID_FILL_HEIGHT of the tank with water.
            const fillTopRow = Math.max(1, Math.floor(M * (1 - FLUID_FILL_HEIGHT)) + 1);
            for (let j = fillTopRow; j <= M; j++)
                for (let i = 1; i <= N; i++)
                    fluid.d[IX(i, j)] = 1.0;

            // "Splash" density at every currently-visible PLAY cell — the
            // letters dissolve into water that falls and merges with the
            // pool. Matches the swirl offset the PLAY renderer uses so
            // the visual transition is continuous.
            const time = Date.now() * 0.0003;
            for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) {
                const offX = Math.floor(Math.sin(y * 0.2 + time * 4) * 1.1);
                const offY = Math.floor(Math.cos(x * 0.2 + time * 3) * 0.8);
                const lx = Math.min(cols - 1, Math.max(0, x + offX));
                const ly = Math.min(rows - 1, Math.max(0, y + offY));
                if (mask[(ly * cols + lx) * 4] > 128) {
                    const gi = Math.min(N, Math.max(1, 1 + ((x / cols) * N) | 0));
                    const gj = Math.min(M, Math.max(1, 1 + ((y / rows) * M) | 0));
                    fluid.d[IX(gi, gj)] = 1.0;
                }
            }

            fluidMode = true;
            fluidLastFrame = performance.now();
            fluidMouseLastPx = fluidMousePx;
            fluidMouseLastPy = fluidMousePy;
            const ui = document.getElementById('ui');
            if (ui) ui.style.display = 'none';
        }

        function updateFluid(dt) {
            if (!fluid) return;
            const { N, M, u, v, d, uPrev, vPrev, dPrev, W, H } = fluid;

            // 1. Gravity — proportional to density so only "water" falls.
            for (let j = 1; j <= M; j++) for (let i = 1; i <= N; i++) {
                v[IX(i, j)] += FLUID_GRAVITY * d[IX(i, j)] * dt;
            }

            // 2. Cursor — carves a cavity (drops density) and pushes
            //    fluid radially OUTWARD from the cursor center, with a
            //    small drag component aligned to cursor motion. This
            //    makes the cursor feel like a solid obstacle moving
            //    through the pool (ReactBits-style), rather than a
            //    giant finger that drags fluid up and away.
            if (fluidMousePx > -9000 && dt > 0.001) {
                const cx = (fluidMousePx / W) * N + 0.5;
                const cy = (fluidMousePy / H) * M + 0.5;
                // Cursor velocity in grid-cells / second (for the drag term)
                const dtSafe = Math.max(dt, 0.004);
                const cVX = (fluidCursorVx / W) * N / dtSafe;
                const cVY = (fluidCursorVy / H) * M / dtSafe;
                const DRAG_CLAMP = 10;
                const dVX = cVX > DRAG_CLAMP ? DRAG_CLAMP : (cVX < -DRAG_CLAMP ? -DRAG_CLAMP : cVX);
                const dVY = cVY > DRAG_CLAMP ? DRAG_CLAMP : (cVY < -DRAG_CLAMP ? -DRAG_CLAMP : cVY);

                const r = FLUID_CURSOR_R;
                const r2 = r * r;
                const PUSH_SPEED = 9;  // radial outward speed (grid-cells/s)

                const iMin = Math.max(1, (cx - r) | 0);
                const iMax = Math.min(N, ((cx + r) | 0) + 1);
                const jMin = Math.max(1, (cy - r) | 0);
                const jMax = Math.min(M, ((cy + r) | 0) + 1);

                for (let j = jMin; j <= jMax; j++) for (let i = iMin; i <= iMax; i++) {
                    const dx = i - cx, dy = j - cy;
                    const dd2 = dx * dx + dy * dy;
                    if (dd2 >= r2) continue;
                    const dd = Math.sqrt(dd2);
                    const fall = 1 - dd / r;
                    const k = IX(i, j);

                    // (a) Carve: reduce density inside the disc so a
                    //     visible hole forms. The pool top-up slowly
                    //     refills this, so the hole fades when the
                    //     cursor leaves.
                    d[k] *= 1 - fall * 0.45;

                    // (b) Push fluid radially OUTWARD — this is what
                    //     makes the cursor feel solid. Waves ripple out.
                    if (dd > 0.25) {
                        const outX = dx / dd;
                        const outY = dy / dd;
                        u[k] += outX * PUSH_SPEED * fall;
                        v[k] += outY * PUSH_SPEED * fall;
                    }

                    // (c) Small drag in cursor's motion direction so
                    //     fast swipes create a visible streak. Light
                    //     enough it doesn't turn into a wake-lift.
                    u[k] += dVX * fall * FLUID_CURSOR_FORCE * 0.25;
                    v[k] += dVY * fall * FLUID_CURSOR_FORCE * 0.25;
                }
            }

            // 3. Velocity step: viscosity → project → advect → project.
            //    Adding a viscosity diffuse before the standard Stam pass
            //    is what makes the fluid resist shear instead of jiggling
            //    like water. Without it, gravity and cursor pushes
            //    propagate too fast and the surface never settles.
            uPrev.set(u); vPrev.set(v);
            diffuse(1, u, uPrev, FLUID_VISCOSITY, dt);
            diffuse(2, v, vPrev, FLUID_VISCOSITY, dt);
            project();
            uPrev.set(u); vPrev.set(v);
            advect(1, u, uPrev, uPrev, vPrev, dt);
            advect(2, v, vPrev, uPrev, vPrev, dt);
            project();

            // 4. Density step: just advect (no diffusion = crisp free surface).
            dPrev.set(d);
            advect(0, d, dPrev, u, v, dt);

            // 4.5. Velocity friction. Acts like drag — viscous fluids
            //      don't keep sloshing forever after you poke them.
            //      Without this the surface jiggles indefinitely; with it,
            //      the pool returns to flat in ~half a second.
            const damp = Math.exp(-FLUID_VEL_FRICTION * dt);
            for (let k = 0; k < u.length; k++) {
                u[k] *= damp;
                v[k] *= damp;
            }

            // 5. Pool maintenance. Semi-Lagrangian advection loses mass
            //    at the water/air interface every frame (bilinear smears
            //    it into the air cells, where it then "escapes"). Without
            //    this top-up the whole pool evaporates in ~3 seconds.
            //    The nudge is gentle enough that the cursor can still
            //    carve visible cavities; they just slowly refill, which
            //    reads as a bathtub settling.
            const poolTopJ = Math.max(1, Math.floor(M * (1 - FLUID_FILL_HEIGHT)) + 1);
            for (let j = poolTopJ; j <= M; j++) {
                for (let i = 1; i <= N; i++) {
                    const k = IX(i, j);
                    if (d[k] < 1.0) d[k] += (1.0 - d[k]) * 0.04;
                }
            }

            // 6. Safety clamp — stop any numerical run-away.
            for (let k = 0; k < d.length; k++) {
                if (d[k] < 0) d[k] = 0;
                else if (d[k] > 1.4) d[k] = 1.4;
            }

            // 7. Surface tension / wisp evaporation in the AIR zone.
            //    Stable Fluids' bilinear advection smears a tiny bit of
            //    density into air cells along the water/air interface
            //    every frame. Those wisps are too light for gravity to
            //    pull down quickly (gravity scales with density), so
            //    they hover indefinitely above the pool — that's where
            //    the "stray dots floating in the air" came from. Real
            //    water holds together via surface tension; we
            //    approximate that here by aggressively decaying any
            //    below-floor density above the pool baseline:
            //      • cells with NO wet neighbours → fast evaporation
            //        (no isolated drops in mid-air)
            //      • cells touching the body → gentle decay
            //        (sharp meniscus, no fuzzy halo)
            //    The pool body itself is untouched so cursor cavities
            //    and waves still behave naturally.
            const cleanupTopJ = Math.max(1, Math.floor(M * (1 - FLUID_FILL_HEIGHT)));
            for (let j = 1; j <= cleanupTopJ; j++) {
                for (let i = 1; i <= N; i++) {
                    const k = IX(i, j);
                    const dk = d[k];
                    if (dk > 0.001 && dk < FLUID_DENSITY_FLOOR) {
                        const wet =
                            (d[IX(i - 1, j)] >= FLUID_DENSITY_FLOOR ? 1 : 0) +
                            (d[IX(i + 1, j)] >= FLUID_DENSITY_FLOOR ? 1 : 0) +
                            (d[IX(i, j - 1)] >= FLUID_DENSITY_FLOOR ? 1 : 0) +
                            (d[IX(i, j + 1)] >= FLUID_DENSITY_FLOOR ? 1 : 0);
                        d[k] *= wet === 0 ? 0.4 : 0.85;
                    }
                }
            }
        }

        function renderFluid() {
            if (!fluid) return;
            const { N, M, d, u, v } = fluid;
            const N2 = N + 2;
            const time = Date.now() * 0.0003;
            const baseHue = colorPhase % 360;
            const floor = FLUID_DENSITY_FLOOR;

            // Density maps to a WINDOWED tier range. Window cuts off:
            //   • bottom (tiers 1-3): dots/punctuation `·'`,.;:` — these
            //     made the body look like it had stray speckles even
            //     when they were "valid" density-mapped picks. Gone.
            //   • top    (tier 10): full-block characters `█▓▒` —
            //     these read as solid blocks rather than ASCII letters
            //     and made the pool look chunky/blocky.
            // What's left is tiers 4-9: `+ = x i l c v o e # & % $ X 8`
            // and friends — all normal-looking letter/symbol glyphs.
            // Within that window we still scale by density, so light
            // meniscus picks lighter glyphs and the heavy core picks
            // chunkier letters. Alphabet-soup texture, no dots, no blocks.
            const MIN_TIER = 4;
            const MAX_TIER = 9;
            const tierSpan = MAX_TIER - MIN_TIER;   // 5

            for (let ry = 0; ry < rows; ry++) {
                const yOff = ry * cellH;
                const gj = Math.min(M, Math.max(1, 1 + ((ry / rows) * M) | 0));
                for (let rx = 0; rx < cols; rx++) {
                    const gi = Math.min(N, Math.max(1, 1 + ((rx / cols) * N) | 0));
                    const gidx = gi + N2 * gj;
                    const density = d[gidx];

                    // Visibility from density ALONE — no noise term.
                    // (Adding noise here was what let stray air cells
                    // light up as floating dots above the pool.)
                    if (density < floor) continue;

                    // Stable per-cell density jitter — same per (rx, ry)
                    // every frame, so adjacent cells of similar density
                    // pick slightly different tiers and you get an
                    // alphabet-soup texture instead of horizontal stripes
                    // of one character. ONLY affects which glyph the
                    // cell renders; visibility was already decided above.
                    const hT = Math.sin(rx * 12.9898 + ry * 78.233) * 43758.5453;
                    const noise = (hT - Math.floor(hT)) * 2 - 1;

                    const effective = density + noise * 0.18;
                    const t = Math.max(0, Math.min(1,
                        (effective - floor) / (1.25 - floor)));
                    const tierIdx = MIN_TIER +
                        Math.min(tierSpan, (t * (tierSpan + 1)) | 0);
                    const tier = FLUID_CHAR_TIERS[tierIdx];

                    // Independent stable hash → glyph pick inside the tier.
                    const h2 = Math.sin(rx * 91.345 + ry * 47.853 + 17.0) * 31415.9265;
                    const pick = h2 - Math.floor(h2);
                    const char = tier[Math.min(tier.length - 1, (pick * tier.length) | 0)];

                    // Color from PLAY's phase + wave formulas → continuous
                    // rainbow cycle inherited from pre-click.
                    const w1 = Math.sin(rx * 0.09 + ry * 0.045 + time * 2);
                    const w2 = Math.cos(rx * 0.04 - ry * 0.075 + time * 1.5);
                    const wave = (w1 + w2) * 0.5;
                    const shimmer = Math.pow(Math.max(0, Math.sin(rx * 0.5 + ry * 0.3 + time * 8)), 10) * 35;
                    const vel = Math.abs(u[gidx]) + Math.abs(v[gidx]);
                    const lightness = Math.min(90,
                        32 + wave * 10 + shimmer + density * 22 + vel * 0.6);

                    ctx.fillStyle = `hsl(${baseHue + wave * 10}, 80%, ${lightness}%)`;
                    ctx.fillText(char, rx * cellW, yOff);
                }
            }
        }

        window.addEventListener('resize', resize);
        resize(); animate();
    </script>

// --- CRYSTAL MONOLITH MATERIAL ---
