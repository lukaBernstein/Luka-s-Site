                const raw = gltf.scene;
                raw.traverse(n => {
                    if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; }
                });

                // Measure after parent transforms resolve, then shift so base
                // sits at y=0 and it's centred in X/Z.
                const bb = new THREE.Box3().setFromObject(raw);
                const height = Math.max(bb.max.y - bb.min.y, 0.0001);
                const widthX = bb.max.x - bb.min.x;
                const widthZ = bb.max.z - bb.min.z;
                raw.position.set(
                    -(bb.min.x + bb.max.x) * 0.5,
                    -bb.min.y,
                    -(bb.min.z + bb.max.z) * 0.5
                );
                const template = new THREE.Group();
                template.add(raw);

                function tooClose(vx, vz) {
                    return Math.sqrt((vx-sX)**2 + (vz-sZ)**2) < 2600;
                }

                let placed = 0;
                const PATCHES = 160;
                for (let p = 0; p < PATCHES; p++) {
                    const cx = (rnd() - 0.5) * 108000;
                    const cz = (rnd() - 0.5) * 108000;
                    if (tooClose(cx, cz)) continue;

                    const count  = 2 + Math.floor(rnd() * 5);    // 2–6 mushrooms per patch
                    const patchR = 60 + rnd() * 140;

                    for (let j = 0; j < count; j++) {
                        const a  = rnd() * Math.PI * 2;
                        const r  = Math.sqrt(rnd()) * patchR;
                        const mx = cx + Math.cos(a) * r;
                        const mz = cz + Math.sin(a) * r;

                        const worldH = 25 + rnd() * 55;          // 25–80 units tall
                        const sc = worldH / height;

                        const m = template.clone(true);
                        m.scale.setScalar(sc);
                        m.rotation.y = rnd() * Math.PI * 2;
                        // Tiny random lean so they don't all face identically
                        m.rotation.x = (rnd() - 0.5) * 0.08;
                        m.rotation.z = (rnd() - 0.5) * 0.08;
                        // Footprint-aware grounding. On hills a single
                        // center-sample left the downslope edge of the
                        // base hovering above terrain. Sample at the four
                        // edges of the footprint plus center, take the
                        // LOWEST, then sink hard so the entire base reads
                        // as planted in soil. The cap is round and small,
                        // so over-sinking the upslope side just blends
                        // into the ground naturally.
                        const footR = Math.max(widthX, widthZ) * sc * 0.5;
                        const gyC = getElevation(mx, mz);
                        const gyN = getElevation(mx, mz - footR);
                        const gyS = getElevation(mx, mz + footR);
                        const gyE = getElevation(mx + footR, mz);
                        const gyW = getElevation(mx - footR, mz);
                        const lowestGy = Math.min(gyC, gyN, gyS, gyE, gyW);
                        m.position.set(mx, lowestGy - worldH * 0.18, mz);
                        scene.add(m);
                        placed++;
                    }
                }
                console.log('Mushrooms spawned:', placed);
            }, undefined, e => console.warn('Mushroom GLB not found:', e));
        })();


        // ── 70 STYLIZED ROCKS ──
        // Pack contains 70 separate rocks positioned at different XYZ in the shared
        // vertex space (like a Blender grid layout). On load, we extract each mesh
        // and re-centre its geometry around origin so we can place each one correctly.
        (function spawn70Rocks() {
            const loader = new GLTFLoader();
            loader.load('assets/70_stylized_rocks.glb', gltf => {
                const templates = [];
                
                // Walk the scene in order — the pack is sorted smallest to biggest,
                // so the array index tells us each rock's relative size.
                const rawNodes = [];
                gltf.scene.traverse(node => {
                    if (node.isMesh && node.name && node.name.startsWith('Object_')) {
                        rawNodes.push(node);
                    }
                });
                // Sort by the numeric suffix in the name to ensure correct size order
                rawNodes.sort((a, b) => {
                    const na = parseInt(a.name.split('_')[1]);
                    const nb = parseInt(b.name.split('_')[1]);
                    return na - nb;
                });

                rawNodes.forEach(node => {
                    const geo = node.geometry.clone();
                    geo.computeBoundingBox();
                    const box = geo.boundingBox;
                    const cx = (box.min.x + box.max.x) * 0.5;
                    const cy = (box.min.y + box.max.y) * 0.5;
                    const cz = (box.min.z + box.max.z) * 0.5;
                    geo.translate(-cx, -cy, -cz);
                    geo.computeBoundingBox();
                    templates.push({
                        geometry: geo,
                        material: node.material,
                        baseY: geo.boundingBox.min.y,
                        height: geo.boundingBox.max.y - geo.boundingBox.min.y
                    });
                });
                
                console.log('Loaded', templates.length, 'rock templates from 70-pack');
                if (templates.length === 0) return;
                
                // Templates are sorted smallest→biggest (70 total). Per
                // user request we now ONLY use the 10 BIGGEST types — the
                // small ones added thousands of barely-visible pebbles
                // that tanked perf without contributing to the silhouette.
                function pickBig() { return templates[60 + Math.floor(rnd() * 10)]; }

                function placeRock(wx, wy, wz, worldH, tmpl, addCollision = false) {
                    tmpl = tmpl || pickBig();
                    const sc = worldH / tmpl.height;
                    const m = new THREE.Mesh(tmpl.geometry, tmpl.material);
                    m.scale.setScalar(sc);
                    m.rotation.y = rnd() * Math.PI * 2;

                    // Sample terrain at 4 points around rock footprint — use LOWEST.
                    // Then sink rocks a bit so they look settled, not perched on tiptoes.
                    const r = worldH * 0.35;
                    const gy1 = getElevation(wx + r, wz);
                    const gy2 = getElevation(wx - r, wz);
                    const gy3 = getElevation(wx, wz + r);
                    const gy4 = getElevation(wx, wz - r);
                    const lowestGround = Math.min(wy, gy1, gy2, gy3, gy4);
                    const settleSink = worldH * 0.12; // 12% of height buried

                    m.position.set(wx, lowestGround - tmpl.baseY * sc - settleSink, wz);
                    m.castShadow = true;
                    m.receiveShadow = true;
                    scene.add(m);

                    // OBB (oriented bounding box). Same shape as the local
                    // bbox of the geometry, but rotated WITH the rock instead
                    // of axis-aligned to the world. This eliminates the
                    // rotation inflation that AABBs suffer (a square rock
                    // rotated 45° gives an AABB ~41% bigger than its actual
                    // footprint). The match is exact at every Y rotation.
                    // Stored as: center, half-extents in local space (already
                    // scaled to world units), and precomputed cos/sin of the
                    // Y rotation so the per-frame test is just a 2D rotate
                    // + AABB compare in the rock's local frame.
                    if (addCollision) {
                        const bb = tmpl.geometry.boundingBox;
                        const hx = (bb.max.x - bb.min.x) * 0.5 * sc;
                        const hy = (bb.max.y - bb.min.y) * 0.5 * sc;
                        const hz = (bb.max.z - bb.min.z) * 0.5 * sc;
                        obstacles.push({
                            type: 'obb',
                            cx: m.position.x, cy: m.position.y, cz: m.position.z,
                            hx, hy, hz,
                            minY: m.position.y - hy,
                            maxY: m.position.y + hy,
                            cosT: Math.cos(m.rotation.y),
                            sinT: Math.sin(m.rotation.y)
                        });
                    }

                    return { mesh: m, scaledHeight: worldH };
                }

                function tooClose(vx, vz) {
                    return Math.sqrt((vx-sX)**2+(vz-sZ)**2) < 2600;
                }

                // ──────────────────────────────────────────────────────
                // TWO-TIER ROCK LAYOUT (down from 3). Pebble scatter was
                // dropped — the smallest 60 rock TYPES are no longer used,
                // only templates 60–69 ship to the world. Counts also
                // trimmed since each placement is now a "real" rock.
                //
                // TIER A = standard mixed piles (the everyday rock pile).
                // TIER B = rare mega boulder formations.
                // ──────────────────────────────────────────────────────

                // TIER A — standard mixed piles. Sizes shifted down a bit
                // since even the small/medium calls now resolve to one of
                // the 10 biggest templates, just at a smaller world scale.
                for (let i = 0; i < 700; i++) {
                    const clX = (rnd()-0.5)*108000;
                    const clZ = (rnd()-0.5)*108000;
                    if (tooClose(clX, clZ)) continue;

                    const spread = 220 + rnd()*550;

                    // 1–3 medium anchors
                    const anchorCount = 1 + Math.floor(rnd()*3);
                    for (let a = 0; a < anchorCount; a++) {
                        const ax = clX + (rnd()-0.5)*180;
                        const az = clZ + (rnd()-0.5)*180;
                        const gy = getElevation(ax, az);
                        const worldH = 220 + rnd()*330;          // 220–550
                        placeRock(ax, gy, az, worldH, pickBig(), true);
                    }

                    // 3–5 medium surrounders
                    const medCount = 3 + Math.floor(rnd()*3);
                    for (let m2 = 0; m2 < medCount; m2++) {
                        const a = rnd()*Math.PI*2;
                        const d = 110 + rnd()*spread*0.4;
                        const bx = clX + Math.cos(a)*d;
                        const bz = clZ + Math.sin(a)*d;
                        const gy = getElevation(bx, bz);
                        const worldH = 110 + rnd()*170;          // 110–280
                        placeRock(bx, gy, bz, worldH, pickBig(), true);
                    }

                    // 2–4 trailing stones (now "small" only by world scale,
                    // not by template — these are still the chunky types).
                    const smallCount = 2 + Math.floor(rnd()*3);
                    for (let s = 0; s < smallCount; s++) {
                        const a = rnd()*Math.PI*2;
                        const d = spread*0.4 + rnd()*spread*0.7;
                        const sx = clX + Math.cos(a)*d;
                        const sz = clZ + Math.sin(a)*d;
                        const gy = getElevation(sx, sz);
                        placeRock(sx, gy, sz, 70 + rnd()*100, pickBig());
                    }
                }

                // TIER B — mega boulder formations. Rare. The anchors here
                // push close together (tight 140-unit cluster radius instead
                // of loose 180-400) so their size + the settle-sink
                // visually stack them against each other like a pile.
                for (let i = 0; i < 55; i++) {
                    const clX = (rnd()-0.5)*108000;
                    const clZ = (rnd()-0.5)*108000;
                    if (tooClose(clX, clZ)) continue;

                    const spread = 500 + rnd()*500;

                    // 3–6 HUGE anchor boulders pressed close together
                    const anchorCount = 3 + Math.floor(rnd()*4);
                    for (let a = 0; a < anchorCount; a++) {
                        const angle = (a / anchorCount) * Math.PI * 2 + rnd()*0.8;
                        const r = rnd() * 140;                    // tight cluster
                        const ax = clX + Math.cos(angle) * r;
                        const az = clZ + Math.sin(angle) * r;
                        const gy = getElevation(ax, az);
                        const worldH = 750 + rnd()*550;           // 750–1300!
                        placeRock(ax, gy, az, worldH, pickBig(), true);
                    }

                    // 6–10 large-medium rocks in a wider ring
                    const medCount = 6 + Math.floor(rnd()*5);
                    for (let m2 = 0; m2 < medCount; m2++) {
                        const a = rnd()*Math.PI*2;
                        const d = 200 + rnd()*spread*0.55;
                        const bx = clX + Math.cos(a)*d;
                        const bz = clZ + Math.sin(a)*d;
                        const gy = getElevation(bx, bz);
                        const worldH = 220 + rnd()*380;           // 220–600
                        placeRock(bx, gy, bz, worldH, pickBig(), true);
                    }

                    // 4–8 scatter rocks around the edges
                    const smallCount = 4 + Math.floor(rnd()*5);
                    for (let s = 0; s < smallCount; s++) {
                        const a = rnd()*Math.PI*2;
                        const d = spread*0.5 + rnd()*spread*0.8;
                        const sx = clX + Math.cos(a)*d;
                        const sz = clZ + Math.sin(a)*d;
                        const gy = getElevation(sx, sz);
                        placeRock(sx, gy, sz, 90 + rnd()*150, pickBig());
                    }
                }
                console.log('Rocks spawned');
            }, undefined, e => console.warn('70-rock pack not found:', e));
        })();

        // ── CLOUDS (GLB) ──
        // Loads assets/Clouds.glb — a low-poly pack with 3 cumulus shapes
        // merged into one mesh. We split that one mesh into the 3 distinct
        // shapes by spatial-clustering its triangles (the GLB has unwelded
        // verts so we can't use connected components — every face would
        // be its own "cloud"). Then instance each cloud type across the
        // sky at high altitude. MeshStandardMaterial means clouds inherit
        // the existing sun + hemisphere lighting automatically — they
        // tint warm at sunset and cool blue at night without any extra
        // shader work, just like trees and rocks do.
        (function spawnClouds() {
            const loader = new GLTFLoader();
            loader.load('assets/Clouds.glb', gltf => {
                // Find the (single) mesh and pull out its geometry.
                let srcMesh = null;
                gltf.scene.traverse(n => { if (n.isMesh && !srcMesh) srcMesh = n; });
                if (!srcMesh) { console.warn('No mesh in Clouds.glb'); return; }

                const srcGeo = srcMesh.geometry;
                const posAttr = srcGeo.attributes.position;
                const idxAttr = srcGeo.index;
                if (!idxAttr) { console.warn('Clouds.glb mesh has no index buffer'); return; }
                const positions = posAttr.array;
                const indices = idxAttr.array;
                const triCount = indices.length / 3;

                // Compute triangle centroids for spatial clustering.
                const centroids = new Float32Array(triCount * 3);
                for (let t = 0; t < triCount; t++) {
                    const a = indices[t*3]   * 3;
                    const b = indices[t*3+1] * 3;
                    const c = indices[t*3+2] * 3;
                    centroids[t*3]   = (positions[a]   + positions[b]   + positions[c])   / 3;
                    centroids[t*3+1] = (positions[a+1] + positions[b+1] + positions[c+1]) / 3;
                    centroids[t*3+2] = (positions[a+2] + positions[b+2] + positions[c+2]) / 3;
                }

                // Spatial-hash union-find: tris within R of each other join
                // the same cluster. R=0.04 (model-local units) is bigger
                // than typical face size (~0.03) but smaller than gaps
                // between separate cloud bodies (>0.05).
                const R = 0.04, R2 = R * R, CELL = R;
                const parent = new Int32Array(triCount);
                for (let i = 0; i < triCount; i++) parent[i] = i;
                const find = x => {
                    while (parent[x] !== x) { parent[x] = parent[parent[x]]; x = parent[x]; }
                    return x;
                };
                const union = (a, b) => {
                    const ra = find(a), rb = find(b);
                    if (ra !== rb) parent[ra] = rb;
                };
                const grid = new Map();
                const cellKey = (cx, cy, cz) => cx + ',' + cy + ',' + cz;
                for (let t = 0; t < triCount; t++) {
                    const cx = Math.floor(centroids[t*3]   / CELL);
                    const cy = Math.floor(centroids[t*3+1] / CELL);
                    const cz = Math.floor(centroids[t*3+2] / CELL);
                    const k = cellKey(cx, cy, cz);
                    let bucket = grid.get(k);
                    if (!bucket) { bucket = []; grid.set(k, bucket); }
                    bucket.push(t);
                }
                for (let t = 0; t < triCount; t++) {
                    const px = centroids[t*3], py = centroids[t*3+1], pz = centroids[t*3+2];
                    const cx = Math.floor(px / CELL);
                    const cy = Math.floor(py / CELL);
                    const cz = Math.floor(pz / CELL);
                    for (let dx = -1; dx <= 1; dx++)
                    for (let dy = -1; dy <= 1; dy++)
                    for (let dz = -1; dz <= 1; dz++) {
                        const bucket = grid.get(cellKey(cx+dx, cy+dy, cz+dz));
                        if (!bucket) continue;
                        for (let i = 0; i < bucket.length; i++) {
                            const u = bucket[i];
                            if (u === t) continue;
                            const ddx = centroids[u*3]   - px;
                            const ddy = centroids[u*3+1] - py;
                            const ddz = centroids[u*3+2] - pz;
                            if (ddx*ddx + ddy*ddy + ddz*ddz < R2) union(t, u);
                        }
                    }
                }

                // Group triangles by root, then build a separate geometry
                // per cluster. We re-pack vertices so each template is
                // self-contained (its own POSITION + NORMAL buffers).
                const clusters = new Map();
                for (let t = 0; t < triCount; t++) {
                    const r = find(t);
                    let arr = clusters.get(r);
                    if (!arr) { arr = []; clusters.set(r, arr); }
                    arr.push(t);
                }
                // Sort by tri count descending and keep all clusters with
                // >100 tris (filters out any stray noise; expected ≈3 clouds).
                const clusterList = [...clusters.values()]
                    .filter(arr => arr.length > 100)
                    .sort((a, b) => b.length - a.length);
                console.log('Cloud shapes extracted:', clusterList.length);
                if (clusterList.length === 0) return;

                const normalAttr = srcGeo.attributes.normal;
                const normals = normalAttr ? normalAttr.array : null;

                const templates = clusterList.map(triList => {
                    // Re-pack: gather unique source verts used by these
                    // tris, build a remap, then emit fresh geometry. Also
                    // recenter X/Z and lift base to y=0 so placement is
                    // just `(x, altitude, z)` with no per-template offset.
                    const usedVerts = new Map();   // srcIdx → newIdx
                    const newPositions = [];
                    const newNormals = [];
                    const newIndices = [];
                    for (const t of triList) {
                        for (let k = 0; k < 3; k++) {
                            const srcIdx = indices[t*3 + k];
                            let newIdx = usedVerts.get(srcIdx);
                            if (newIdx === undefined) {
                                newIdx = newPositions.length / 3;
                                usedVerts.set(srcIdx, newIdx);
                                newPositions.push(
                                    positions[srcIdx*3],
                                    positions[srcIdx*3+1],
                                    positions[srcIdx*3+2]
                                );
                                if (normals) newNormals.push(
                                    normals[srcIdx*3],
                                    normals[srcIdx*3+1],
                                    normals[srcIdx*3+2]
                                );
                            }
                            newIndices.push(newIdx);
                        }
                    }
                    const geo = new THREE.BufferGeometry();
                    geo.setAttribute('position', new THREE.Float32BufferAttribute(newPositions, 3));
                    if (newNormals.length) geo.setAttribute('normal', new THREE.Float32BufferAttribute(newNormals, 3));
                    else geo.computeVertexNormals();
                    geo.setIndex(newIndices);
                    geo.computeBoundingBox();
                    const bb = geo.boundingBox;
                    geo.translate(
                        -(bb.min.x + bb.max.x) * 0.5,
                        -bb.min.y,
                        -(bb.min.z + bb.max.z) * 0.5
                    );
                    geo.computeBoundingBox();
                    const h = geo.boundingBox.max.y;
                    return { geometry: geo, height: h };
                });

                // Single shared material: bright white, full roughness so
                // it stays matte (no specular highlights), no metalness.
                // The scene's existing sunLight + hemiLight do all the
                // tinting work — warm at sunset, blue at night, white
                // at noon, completely automatic.
                //
                // Semi-transparent (opacity 0.85) so you can faintly see
                // the sky/sun through clouds — reads as wispy vapor rather
                // than solid styrofoam. depthWrite OFF prevents overlapping
                // clouds from punching depth-buffer holes in each other,
                // which would produce visible seams when one drifts behind
                // another. depthTest stays ON so terrain/sun/moon still
                // occlude clouds correctly.
                const cloudMat = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    roughness: 1.0,
                    metalness: 0.0,
                    flatShading: false,
                    transparent: true,
                    opacity: 0.85,
                    depthWrite: false,
                });

                // Spawn instances. Clouds aren't static — they drift on
                // wind across the world AND have a fade-in / live / fade-out
                // life cycle, then respawn at a random location. This reads
                // like real cumulus condensing, drifting, and dissipating.
                //
                // Each cloud stores its own state in userData so the per-
                // frame tick function (registered as window.cloudsTick and
                // called from the main animate loop) can update them.
                const CLOUD_COUNT = 30;
                const ALT_MIN = 8500;
                const ALT_MAX = 12000;
                const SCALE_MIN = 1500;   // each unit of model height → world units
                const SCALE_MAX = 3500;
                const SPREAD = 90000;

                // Wind direction (unit XZ) and speed in world units / sec.
                // At 110 u/s a cloud crosses the 90k spread in ~14 minutes —
                // noticeably moving while you watch the sky.
                const WIND_DIR_X = 0.85;
                const WIND_DIR_Z = 0.53;
                const WIND_SPEED = 110;

                // Lifecycle: each cloud lives ~LIFE_SECONDS, with FADE_FRAC
                // of that spent ramping in (start) and out (end). Start
                // each cloud at a random point in its life so they don't
                // all bloom and die in sync. With LIFE=240s and FADE=0.30,
                // the bloom and dissipation phases each take ~72 seconds —
                // slow enough that you can watch a cloud actually form.
                const LIFE_SECONDS = 240;
                const FADE_FRAC    = 0.30;   // 30% in, 40% full, 30% out

                const clouds = [];
                let placed = 0;
                for (let i = 0; i < CLOUD_COUNT; i++) {
                    const tpl = templates[Math.floor(rnd() * templates.length)];
                    const cloud = new THREE.Mesh(tpl.geometry, cloudMat);
                    const targetH = SCALE_MIN + rnd() * (SCALE_MAX - SCALE_MIN);
                    const fullScale = targetH / tpl.height;
                    cloud.position.set(
                        (rnd() - 0.5) * SPREAD,
                        ALT_MIN + rnd() * (ALT_MAX - ALT_MIN),
                        (rnd() - 0.5) * SPREAD
                    );
                    cloud.rotation.y = rnd() * Math.PI * 2;
                    cloud.scale.setScalar(0.001);   // start invisible; tick will scale up
                    cloud.castShadow = false;
                    cloud.receiveShadow = false;
                    cloud.frustumCulled = true;
                    // Per-cloud state for the tick function. fullScale is
                    // the peak size; lifeAge starts random so clouds are
                    // staggered through their lifecycles at world load.
                    cloud.userData = {
                        fullScale: fullScale,
                        // Slight horizontal stretch baked into the scale
                        // multipliers so the tick can just write
                        // scale.x = baseScale * stretchX, etc.
                        stretchX: 1.3,
                        stretchY: 1.0,
                        stretchZ: 1.3,
                        lifeAge: rnd() * LIFE_SECONDS,
                    };
                    scene.add(cloud);
                    clouds.push(cloud);
                    placed++;
                }
                console.log('Clouds spawned:', placed);

                // Half-extents of the wrap volume. When a cloud drifts
                // past +HALF on either axis, snap it to -HALF so it
                // re-enters from the opposite edge — looks like an
                // endless sky.
                const HALF = SPREAD * 0.5;

                // Smoothstep helper for soft fade in/out instead of linear.
                // Cubic eases at both ends so clouds bloom and dissipate
                // gently rather than popping.
                const smoothstep = (e0, e1, x) => {
                    const t = Math.max(0, Math.min(1, (x - e0) / (e1 - e0)));
                    return t * t * (3 - 2 * t);
                };

                // Per-frame update function. Called once per frame from
                // the main animate loop. Drifts each cloud with wind and
                // updates its lifecycle scale. Cheap — ~30 clouds × a
                // handful of math ops per frame, no allocations.
                window.cloudsTick = function(delta) {
                    const wx = WIND_DIR_X * WIND_SPEED * delta;
                    const wz = WIND_DIR_Z * WIND_SPEED * delta;
                    for (let i = 0; i < clouds.length; i++) {
                        const c = clouds[i];
                        const ud = c.userData;

                        // Wind drift + wrap. If the cloud crosses an edge,
                        // snap it to the opposite side AND randomize the
                        // perpendicular axis a bit so wrapping doesn't
                        // produce visible rails of clouds.
                        c.position.x += wx;
                        c.position.z += wz;
                        if (c.position.x >  HALF) { c.position.x = -HALF; c.position.z = (rnd()-0.5) * SPREAD; }
                        if (c.position.x < -HALF) { c.position.x =  HALF; c.position.z = (rnd()-0.5) * SPREAD; }
                        if (c.position.z >  HALF) { c.position.z = -HALF; c.position.x = (rnd()-0.5) * SPREAD; }
                        if (c.position.z < -HALF) { c.position.z =  HALF; c.position.x = (rnd()-0.5) * SPREAD; }

                        // Lifecycle. Age normalized to 0-1 over LIFE_SECONDS.
                        // Fade ramps: 0 → 1 over first FADE_FRAC, hold at 1,
                        // 1 → 0 over last FADE_FRAC. When age completes, the
                        // cloud "dies" and respawns at a random spot with a
                        // new height/rotation so the sky composition keeps
                        // changing instead of repeating.
                        ud.lifeAge += delta;
                        if (ud.lifeAge >= LIFE_SECONDS) {
                            ud.lifeAge = 0;
                            c.position.set(
                                (rnd() - 0.5) * SPREAD,
                                ALT_MIN + rnd() * (ALT_MAX - ALT_MIN),
                                (rnd() - 0.5) * SPREAD
                            );
                            c.rotation.y = rnd() * Math.PI * 2;
                        }
                        const t = ud.lifeAge / LIFE_SECONDS;
                        const fadeIn  = smoothstep(0,            FADE_FRAC,     t);
                        const fadeOut = smoothstep(1 - FADE_FRAC, 1.0,           t);
                        const life = fadeIn * (1 - fadeOut);
                        const s = ud.fullScale * life;
                        c.scale.set(s * ud.stretchX, s * ud.stretchY, s * ud.stretchZ);
                    }
                };
            }, undefined, e => console.warn('Clouds GLB not found:', e));
        })();


// --- 5 DISTANT CRYSTAL MONOLITHS WITH FULL PARKOUR ---
        // Each tower gets:
        //   • its own color palette (3 colors fed to the monolith shader)
        //   • a spiral parkour course that climbs from base to peak
        //   • 7 platform types: entry, precision pad, bridge, long causeway,
        //     hexagonal rest disc, twin-pad branching choice, cluster of
        //     stepping stones, and a tall pinnacle. Variety driven by
        //     priority-ordered checks on the platform index `k`.
        //   • a circular reward cap above the peak
        //
        // Difficulty stays bounded by the existing jump physics: vertical
        // gaps land near 150–200 units (single-jump arc is ~325). Wider
        // platform types (twins, clusters) only ADD landing options — the
        // primary spiral pad is always there, so a player who ignores the
        // variety still has a clean path up.
        const pillarGeo = new THREE.IcosahedronGeometry(1, 0);

        // Five distinct palettes — one per tower, applied in spawn order.
        // Each is a (deep accent, glow accent, highlight) triplet that the
        // shader cycles through. Colors picked to read clearly against
        // both day and night sky.
        const MONOLITH_PALETTES = [
            { a: 0x6b3dff, b: 0x00d4ff, c: 0xff5588 },  // mystic violet
            { a: 0x22cc55, b: 0x00ffaa, c: 0xffcc44 },  // emerald grove
            { a: 0xff3344, b: 0xff8822, c: 0xffdd55 },  // solar flare
            { a: 0x4488ff, b: 0x88ddff, c: 0xeef4ff },  // glacial
            { a: 0xff44aa, b: 0xcc66ff, c: 0xffaa88 },  // bloom
        ];

        let pillarsSpawned = 0;
        while (pillarsSpawned < 5) {
            const px = sX + (rnd() - 0.5) * 45000;
            const pz = sZ + (rnd() - 0.5) * 45000;
            const dist = Math.sqrt((px - sX)**2 + (pz - sZ)**2);

            if (dist > 15000 && dist < 30000) {
                // ─── THE MONOLITH ───
                // Per-tower material so each tower has unique colors. The
                // material registers itself in `monolithMats` so the
                // animate loop's uTime tick reaches it.
                const palette = MONOLITH_PALETTES[pillarsSpawned % MONOLITH_PALETTES.length];
                const towerMat = makeMonolithMat(palette.a, palette.b, palette.c);

                const p = new THREE.Mesh(pillarGeo, towerMat);
                const groundH = getElevation(px, pz);
                const sW = 600 + rnd() * 400;
                const sH = 3000 + rnd() * 2000;

                p.scale.set(sW, sH, sW);
                p.position.set(px, groundH + (sH / 2) + 200, pz);
                p.rotation.y = rnd() * Math.PI;
                p.castShadow = true;
                p.userData.rotSpeed = (rnd() - 0.5) * 0.2;
                p.userData.isMonolith = true;   // animate-loop spin uses this flag
                scene.add(p);

                // Cylinder collision — icosahedron AABB inflates badly when rotated.
                obstacles.push({
                    type: 'cylinder',
                    cx: px, cz: pz, r: sW * 0.82,
                    minY: groundH, maxY: groundH + 200 + sH * 1.351 + 100
                });

                // ─── PARKOUR COURSE — climbs past the tower top ───
                const baseY  = groundH + 180;
                // Real mesh top calculation. IcosahedronGeometry normalizes
                // vertices to a unit sphere — the highest vertex y is 0.851
                // (not 1.0). With position.y = groundH + sH/2 + 200 and
                // scale.y = sH, the top vertex sits at:
                //   groundH + sH/2 + 200 + 0.851 * sH = groundH + 200 + 1.351*sH
                // Treating sH as the full height (the previous bug) put the
                // "peak" 0.351*sH below the actual apex — for a 4000-unit
                // tower, that's 1400 units of mesh that the spiral and cap
                // were being placed *inside*. The 1.05 multiplier on 1.351
                // adds a small safety margin since the tower spins, so any
                // platform within a few units of the true apex would still
                // intersect the rotating geometry occasionally.
                const meshTopY = groundH + 200 + sH * 1.351 * 1.05;
                const peakY    = meshTopY;                    // for naming consistency
                // Extend the spiral 500 units ABOVE the real mesh top so
                // the final platforms float in open air over the tower
                // rather than ending halfway up its side.
                const summitY = peakY + 500;
                const totalH  = summitY - baseY;
                const platformCount = Math.max(22, Math.floor(totalH / 175));
                const spiralTurns = 2.4 + rnd() * 0.5;
                // Critical fix: minR was sW*0.6+260, but an icosahedron's
                // equator vertices sit at distance sW*0.894 from the axis,
                // and the tower SLOWLY ROTATES — so vertex tips swept
                // through the platforms over time, making them appear
                // embedded in the tower walls. minR is now sW*1.0+240 so
                // platforms are always comfortably outside the swept
                // envelope of the rotating mesh.
                const minR = sW * 1.0 + 240;
                const maxR = sW * 1.0 + 720;
                const startAngle = rnd() * Math.PI * 2;

                // ── Helper: register a flat axis-aligned box obstacle.
                // Used by every platform type for collision since the
                // existing physics resolver handles `box` cleanly and the
                // rotation we apply is Y-only / cosmetic.
                const addBox = (cx, cy, cz, sx, sy, sz) => {
                    const hx = sx / 2, hy = sy / 2, hz = sz / 2;
                    obstacles.push({
                        type: 'box',
                        box: new THREE.Box3(
                            new THREE.Vector3(cx - hx, cy - hy, cz - hz),
                            new THREE.Vector3(cx + hx, cy + hy, cz + hz)
                        )
                    });
                };

                for (let k = 0; k < platformCount; k++) {
                    const t = k / Math.max(1, platformCount - 1);
                    const angle = startAngle + t * spiralTurns * Math.PI * 2;

                    // Slight ease — denser near the bottom (warm-up section).
                    const heightT = Math.pow(t, 0.92);
                    const platY = baseY + heightT * totalH;

                    // Radius oscillates so platforms aren't all at one
                    // distance from the tower — the climb pushes you inward
                    // and outward, not just around in a flat circle.
                    const radiusWave = Math.sin(k * 0.62 + 0.3) * 0.5 + 0.5;
                    const baseRadius = minR + radiusWave * (maxR - minR);
                    // Once the spiral climbs above the tower's tip, contract
                    // the radius so platforms funnel toward the central
                    // axis where the cap sits. Below peakY the tower is
                    // the spine the spiral wraps around; above peakY the
                    // spiral is floating in open air, so it should converge
                    // toward the goal rather than circling empty space.
                    // Linear ramp over the last 500 units of climb (which
                    // is exactly the above-tower portion we added in
                    // totalH), shrinking radius to 30% at the very top.
                    const aboveT = Math.max(0, Math.min(1, (platY - peakY) / 500));
                    const radius = baseRadius * (1 - aboveT * 0.7);

                    const platX = px + Math.cos(angle) * radius;
                    const platZ = pz + Math.sin(angle) * radius;

                    // ── Platform type selection (priority-ordered) ──
                    // The first matching rule wins, so order matters. Special
                    // types (pinnacle/cluster/twin/arch/staircase/arc/leap)
                    // only fire mid-climb after the warm-up and before the
                    // final approach so the beginning and end stay grippy.
                    // Mods are different primes so the types don't all
                    // collide on the same `k` index across the 5 towers.
                    const inSpecialBand = k > 5 && k < platformCount - 3;
                    let type;
                    if (k === 0)                                 type = 'entry';
                    else if (inSpecialBand && k % 13 === 7)      type = 'arch';
                    else if (inSpecialBand && k % 11 === 6)      type = 'pinnacle';
                    else if (inSpecialBand && k % 11 === 8)      type = 'staircase';
                    else if (inSpecialBand && k % 9  === 4)      type = 'cluster';
                    else if (inSpecialBand && k % 9  === 7)      type = 'arc';
                    else if (inSpecialBand && k % 8  === 5)      type = 'twin';
                    else if (inSpecialBand && k % 14 === 11)     type = 'leap';
                    else if (k % 7 === 3)                        type = 'hex_rest';
                    else if (k > 0 && k % 5 === 1)               type = 'causeway';
                    else if (k > 0 && k % 4 === 0)               type = 'bridge';
                    else                                          type = 'precision';

                    if (type === 'entry') {
                        // Big welcoming pad at the base. Square box.
                        const sx = 580, ph = 100;
                        const m = new THREE.Mesh(new THREE.BoxGeometry(sx, ph, sx), rockMat);
                        m.position.set(platX, platY, platZ);
                        m.castShadow = true; m.receiveShadow = true;
                        scene.add(m);
                        addBox(platX, platY, platZ, sx, ph, sx);

                    } else if (type === 'hex_rest') {
                        // Hexagonal stone disc — wider, signals "rest here".
                        // CylinderGeometry(r, r, h, 6) gives a clean hex
                        // and the cylinder collision matches it well enough
                        // (slight inflation in the corners is harmless on a
                        // pad you're meant to land on comfortably).
                        const r = 240, ph = 80;
                        const m = new THREE.Mesh(
                            new THREE.CylinderGeometry(r, r * 0.95, ph, 6),
                            rockMat
                        );
                        m.position.set(platX, platY, platZ);
                        m.rotation.y = rnd() * Math.PI;
                        m.castShadow = true; m.receiveShadow = true;
                        scene.add(m);
                        obstacles.push({
                            type: 'cylinder',
                            cx: platX, cz: platZ, r: r * 0.92,
                            minY: platY - ph / 2, maxY: platY + ph / 2
                        });

                    } else if (type === 'bridge') {
                        // Long rectangle, aligned with the spiral tangent so
                        // the long axis points toward the next platform.
                        const sx = 380, sz = 200, ph = 60;
                        const yaw = angle + Math.PI / 2;
                        const m = new THREE.Mesh(new THREE.BoxGeometry(sx, ph, sz), rockMat);
                        m.position.set(platX, platY, platZ);
                        m.rotation.y = yaw;
                        m.castShadow = true; m.receiveShadow = true;
                        scene.add(m);
                        // OBB collision matches the visual rotation exactly.
                        obstacles.push({
                            type: 'obb',
                            cx: platX, cy: platY, cz: platZ,
                            hx: sx / 2, hy: ph / 2, hz: sz / 2,
                            minY: platY - ph / 2, maxY: platY + ph / 2,
                            cosT: Math.cos(yaw), sinT: Math.sin(yaw)
                        });

                    } else if (type === 'causeway') {
                        // Wider and longer than a bridge — a deliberate
                        // path segment that you can run across rather than
                        // jump in one bound. Same rotation/OBB pattern.
                        const sx = 520, sz = 260, ph = 65;
                        const yaw = angle + Math.PI / 2;
                        const m = new THREE.Mesh(new THREE.BoxGeometry(sx, ph, sz), rockMat);
                        m.position.set(platX, platY, platZ);
                        m.rotation.y = yaw;
                        m.castShadow = true; m.receiveShadow = true;
                        scene.add(m);
                        obstacles.push({
                            type: 'obb',
                            cx: platX, cy: platY, cz: platZ,
                            hx: sx / 2, hy: ph / 2, hz: sz / 2,
                            minY: platY - ph / 2, maxY: platY + ph / 2,
                            cosT: Math.cos(yaw), sinT: Math.sin(yaw)
                        });

                    } else if (type === 'twin') {
                        // Two precision pads side-by-side, perpendicular to
                        // the spiral tangent. Player picks left or right.
                        // Both are placed so either choice is reachable from
                        // the previous platform; the next platform is also
                        // reachable from either, so it's a genuine fork.
                        const padS = 170;
                        const ph = 50;
                        const sep = 200;
                        const perpX = -Math.sin(angle);
                        const perpZ =  Math.cos(angle);
                        for (let s = -1; s <= 1; s += 2) {
                            const cx = platX + perpX * sep * s;
                            const cz = platZ + perpZ * sep * s;
                            const m = new THREE.Mesh(
                                new THREE.BoxGeometry(padS, ph, padS), rockMat);
                            m.position.set(cx, platY, cz);
                            m.rotation.y = angle;
                            m.castShadow = true; m.receiveShadow = true;
                            scene.add(m);
                            // Y-rotation only → use OBB so the collision
                            // box doesn't inflate with rotation.
                            obstacles.push({
                                type: 'obb',
                                cx, cy: platY, cz,
                                hx: padS / 2, hy: ph / 2, hz: padS / 2,
                                minY: platY - ph / 2, maxY: platY + ph / 2,
                                cosT: Math.cos(angle), sinT: Math.sin(angle)
                            });
                        }

                    } else if (type === 'cluster') {
                        // Three small stepping stones in a tight triangle
                        // around (platX, platZ), each at a slightly
                        // different height. Forces a quick 1-2-3 hop
                        // rhythm. Heights stay within ±35 units so the
                        // cluster as a whole reads at platY for the spiral
                        // continuity.
                        const stoneS = 140;
                        const stoneH = 45;
                        const ringR  = 170;
                        for (let s = 0; s < 3; s++) {
                            const sa = (s / 3) * Math.PI * 2 + rnd() * 0.4;
                            const cx = platX + Math.cos(sa) * ringR;
                            const cz = platZ + Math.sin(sa) * ringR;
                            const cy = platY + (s - 1) * 28;
                            const m = new THREE.Mesh(
                                new THREE.BoxGeometry(stoneS, stoneH, stoneS), rockMat);
                            m.position.set(cx, cy, cz);
                            m.rotation.y = rnd() * Math.PI;
                            m.castShadow = true; m.receiveShadow = true;
                            scene.add(m);
                            addBox(cx, cy, cz, stoneS, stoneH, stoneS);
                        }

                    } else if (type === 'pinnacle') {
                        // Tall thin pillar with a wider disc on top —
                        // landing target sits at platY (same as the spiral),
                        // but the shaft visibly extends ~280 units below
                        // the disc, giving the course vertical drama.
                        const topR  = 130;
                        const topH  = 50;
                        const shaftR = 55;
                        const shaftH = 280;
                        const shaftCenterY = platY - topH / 2 - shaftH / 2;

                        const shaft = new THREE.Mesh(
                            new THREE.CylinderGeometry(shaftR, shaftR * 1.6, shaftH, 8),
                            rockMat
                        );
                        shaft.position.set(platX, shaftCenterY, platZ);
                        shaft.castShadow = true; shaft.receiveShadow = true;
                        scene.add(shaft);

                        const top = new THREE.Mesh(
                            new THREE.CylinderGeometry(topR, topR * 0.9, topH, 12),
                            rockMat
                        );
                        top.position.set(platX, platY, platZ);
                        top.castShadow = true; top.receiveShadow = true;
                        scene.add(top);

                        // Two cylinder collisions: the disc (you land on
                        // its top face) and the shaft (you can't walk
                        // through it). minY/maxY chosen so disc takes
                        // priority for the floor test when standing on it.
                        obstacles.push({
                            type: 'cylinder',
                            cx: platX, cz: platZ, r: topR * 0.95,
                            minY: platY - topH / 2, maxY: platY + topH / 2
                        });
                        obstacles.push({
                            type: 'cylinder',
                            cx: platX, cz: platZ, r: shaftR * 1.4,
                            minY: shaftCenterY - shaftH / 2,
                            maxY: shaftCenterY + shaftH / 2 - 5   // small gap below disc
                        });

                    } else if (type === 'staircase') {
                        // Three small ascending steps heading radially
                        // outward from the spiral position. The lowest
                        // step is at platY (so the spiral path stays
                        // continuous), and each next step rises ~55
                        // units — manageable in one jump. A player who
                        // climbs all three ends up ~110 above platY, a
                        // small head-start on the next platform.
                        const baseS = 130, ph = 40;
                        const outX = Math.cos(angle), outZ = Math.sin(angle);
                        for (let s = 0; s < 3; s++) {
                            const sx2 = platX + outX * 130 * s;
                            const sz2 = platZ + outZ * 130 * s;
                            const sy2 = platY + s * 55;
                            const m = new THREE.Mesh(
                                new THREE.BoxGeometry(baseS, ph, baseS), rockMat);
                            m.position.set(sx2, sy2, sz2);
                            m.castShadow = true; m.receiveShadow = true;
                            scene.add(m);
                            addBox(sx2, sy2, sz2, baseS, ph, baseS);
                        }

                    } else if (type === 'arc') {
                        // Four small pads arranged in a curved line,
                        // bowing outward from the spiral. Reads as a
                        // crescent bridge segment — you hop pad-to-pad
                        // along the curve. The middle two are slightly
                        // farther out than the ends, giving the arc its
                        // shape.
                        const padS = 120, ph = 35;
                        const perpX = -Math.sin(angle), perpZ = Math.cos(angle);
                        const archCount = 4;
                        for (let s = 0; s < archCount; s++) {
                            const t2 = (s / (archCount - 1)) - 0.5;     // -0.5..+0.5
                            const along = t2 * 380;                     // span perp
                            const bow = (1 - 4 * t2 * t2) * 90;          // outward bow
                            const cx = platX + perpX * along + Math.cos(angle) * bow;
                            const cz = platZ + perpZ * along + Math.sin(angle) * bow;
                            const m = new THREE.Mesh(
                                new THREE.BoxGeometry(padS, ph, padS), rockMat);
                            m.position.set(cx, platY, cz);
                            m.castShadow = true; m.receiveShadow = true;
                            scene.add(m);
                            addBox(cx, platY, cz, padS, ph, padS);
                        }

                    } else if (type === 'leap') {
                        // A "leap of faith" pad — placed off-spiral and
                        // a bit higher, requiring a longer single jump
                        // (or a comfortable double-jump). The spiral
                        // landing pad is ALSO placed at platY so a
                        // player who skips the leap still has a clean
                        // continuous climb. Optional challenge / shortcut.
                        const ph = 50;
                        const leapDist = 380;
                        const lx = platX + Math.cos(angle - 0.5) * leapDist;
                        const lz = platZ + Math.sin(angle - 0.5) * leapDist;
                        const ly = platY + 80;
                        const leapPad = new THREE.Mesh(
                            new THREE.BoxGeometry(200, ph, 200), rockMat);
                        leapPad.position.set(lx, ly, lz);
                        leapPad.castShadow = true; leapPad.receiveShadow = true;
                        scene.add(leapPad);
                        addBox(lx, ly, lz, 200, ph, 200);

                        // Standard precision pad on the spiral so the
                        // course stays completable without taking the leap.
                        const main = new THREE.Mesh(
                            new THREE.BoxGeometry(160, ph, 160), rockMat);
                        main.position.set(platX, platY, platZ);
                        main.castShadow = true; main.receiveShadow = true;
                        scene.add(main);
                        addBox(platX, platY, platZ, 160, ph, 160);

                    } else if (type === 'arch') {
                        // Stonehenge-style trilithon spanning the spiral
                        // path: two uprights flanking a standard landing
                        // pad, with a horizontal lintel high overhead.
                        // Adds architecture/scale to a course that's
                        // otherwise individual pads. Lintel clearance is
                        // chosen so a single jump from the pad doesn't
                        // bonk it; double-jumping straight up will, which
                        // is fine — that's not a path-forward motion.
                        const padS = 220, ph = 50;
                        const pad = new THREE.Mesh(
                            new THREE.BoxGeometry(padS, ph, padS), rockMat);
                        pad.position.set(platX, platY, platZ);
                        pad.castShadow = true; pad.receiveShadow = true;
                        scene.add(pad);
                        addBox(platX, platY, platZ, padS, ph, padS);

                        // Two uprights, perpendicular to the spiral tangent.
                        const perpX = -Math.sin(angle), perpZ = Math.cos(angle);
                        const uprightSep = 280;
                        const uprightW = 60, uprightH = 500;
                        for (let s = -1; s <= 1; s += 2) {
                            const ux = platX + perpX * uprightSep * s;
                            const uz = platZ + perpZ * uprightSep * s;
                            const uy = platY + ph / 2 + uprightH / 2;
                            const u = new THREE.Mesh(
                                new THREE.BoxGeometry(uprightW, uprightH, uprightW),
                                rockMat);
                            u.position.set(ux, uy, uz);
                            u.castShadow = true; u.receiveShadow = true;
                            scene.add(u);
                            obstacles.push({
                                type: 'cylinder',
                                cx: ux, cz: uz, r: uprightW * 0.6,
                                minY: uy - uprightH / 2, maxY: uy + uprightH / 2
                            });
                        }

                        // Horizontal lintel spanning the two uprights.
                        // BoxGeometry with the LONG axis as Z, then rotate
                        // around Y so local +Z aligns with the
                        // (perpX, perpZ) direction. yaw = -angle gives that
                        // alignment for our (perpX = -sin(angle), perpZ = cos(angle))
                        // perpendicular convention.
                        const lintelLen = uprightSep * 2 + uprightW * 1.5;
                        const lintelH = 60;
                        const lintelY = platY + ph / 2 + uprightH + lintelH / 2;
                        const lintelYaw = -angle;
                        const lintel = new THREE.Mesh(
                            new THREE.BoxGeometry(uprightW * 1.2, lintelH, lintelLen),
                            rockMat);
                        lintel.position.set(platX, lintelY, platZ);
                        lintel.rotation.y = lintelYaw;
                        lintel.castShadow = true; lintel.receiveShadow = true;
                        scene.add(lintel);
                        obstacles.push({
                            type: 'obb',
                            cx: platX, cy: lintelY, cz: platZ,
                            hx: uprightW * 0.6, hy: lintelH / 2, hz: lintelLen / 2,
                            minY: lintelY - lintelH / 2, maxY: lintelY + lintelH / 2,
                            cosT: Math.cos(lintelYaw), sinT: Math.sin(lintelYaw)
                        });

                    } else {
                        // type === 'precision' (default). Small square pad.
                        const s = 160 + rnd() * 90, ph = 50;
                        const m = new THREE.Mesh(
                            new THREE.BoxGeometry(s, ph, s), rockMat);
                        m.position.set(platX, platY, platZ);
                        m.castShadow = true; m.receiveShadow = true;
                        scene.add(m);
                        addBox(platX, platY, platZ, s, ph, s);
                    }

                    // ── SIDE-BRANCH CHALLENGE ──
                    // Off-spiral pad every ~6 platforms (after warm-up,
                    // before the summit). Detour for the view, or use it
                    // as a double-jump shortcut.
                    if (k > 4 && k < platformCount - 3 && k % 6 === 2) {
                        const branchAngle  = angle - Math.PI * 0.3;
                        const branchRadius = radius + 220 + rnd() * 220;
                        const bx = px + Math.cos(branchAngle) * branchRadius;
                        const bz = pz + Math.sin(branchAngle) * branchRadius;
                        const by = platY + 50 + rnd() * 90;
                        const bSize = 140 + rnd() * 60;
                        const branch = new THREE.Mesh(
                            new THREE.BoxGeometry(bSize, 50, bSize), rockMat);
                        branch.position.set(bx, by, bz);
                        branch.castShadow = true;
                        branch.receiveShadow = true;
                        scene.add(branch);
                        addBox(bx, by, bz, bSize, 50, bSize);
                    }
                }

                // ─── REWARD SUMMIT: ornate temple at the peak ───
                // Now that the spiral itself climbs to peakY + 500, the cap
                // sits 200 above that — so the player's last jump goes from
                // the topmost spiral platform UP onto the cap rather than
                // sideways onto a disc embedded in the spiral. Cap is
                // visibly above EVERYTHING: the tower tip, the spiral, all
                // of it. The crystal then floats above the cap as before.
                const capY = peakY + 700;
                const capR = 500;

                // 1. Main disc
                const cap = new THREE.Mesh(
                    new THREE.CylinderGeometry(capR, capR * 0.95, 90, 24),
                    rockMat
                );
                cap.position.set(px, capY, pz);
                cap.castShadow = true;
                cap.receiveShadow = true;
                scene.add(cap);
                obstacles.push({
                    type: 'cylinder',
                    cx: px, cz: pz,
                    r: capR,
                    minY: capY - 45,
                    maxY: capY + 45
                });

                // 2. Raised stone ring around the outer edge. Torus laid
                // flat (rotated 90° around X). Sits proud of the disc top.
                const ring = new THREE.Mesh(
                    new THREE.TorusGeometry(capR * 0.94, 28, 8, 36),
                    rockMat
                );
                ring.position.set(px, capY + 55, pz);
                ring.rotation.x = Math.PI / 2;
                ring.castShadow = true;
                ring.receiveShadow = true;
                scene.add(ring);

                // 3. Six obelisks around the perimeter. Tall slim stones
                // with cylinder collision so the player can't walk through
                // them when wandering the cap.
                const obeliskCount = 6;

            const disc = ctx.createRadialGradient(cx - r * 0.25, cy - r * 0.25, r * 0.05, cx, cy, r);
            disc.addColorStop(0.00, '#ffffff');
            disc.addColorStop(0.55, '#f6f1e2');
            disc.addColorStop(0.88, '#d6cfb8');

            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);

        function collidesAt(tx, tz) {
            const fy = camera.position.y - USER_HEIGHT;
            const hy = camera.position.y;
            for (const obs of obstacles) {
                if (obs.type === 'cylinder') {
                    if (hy <= obs.minY || fy >= obs.maxY) continue;
                    const dx = tx - obs.cx, dz = tz - obs.cz;
                    if (dx*dx + dz*dz < (obs.r + PR) * (obs.r + PR)) return true;
                } else if (obs.type === 'ellipsoid') {
                    // Skip if player is clearly above or below the rock's AABB
                    if (fy >= obs.aabb.max.y || hy <= obs.aabb.min.y) continue;
                    // Broad-phase: skip if player center is obviously far from rock center
                    const bdx = tx - obs.center.x, bdz = tz - obs.center.z;
                    const maxR = Math.max(obs.rx, obs.ry, obs.rz) + PR;
                    if (bdx*bdx + bdz*bdz > maxR*maxR) continue;
                    // Transform player into rock's local space, then ellipsoid test
                    _pLocal.set(tx, camera.position.y - USER_HEIGHT * 0.5, tz);
                    _pLocal.applyMatrix4(obs.invMatrix);
                    const ex = _pLocal.x / obs.rx;
                    const ey = _pLocal.y / obs.ry;
                    const ez = _pLocal.z / obs.rz;
                    if (ex*ex + ey*ey + ez*ez < 1.0) return true;
                } else if (obs.type === 'obb') {
                    // Y-band reject (same shape as cylinder/box).
                    if (hy <= obs.minY || fy >= obs.maxY) continue;
                    // Bring the test point into the OBB's local XZ frame by
                    // rotating it by -theta around the OBB's center. Since
                    // we only rotate around Y, the vertical axis is shared
                    // with the world and we can test it as a band above.
                    const dx = tx - obs.cx, dz = tz - obs.cz;
                    const lx = dx * obs.cosT - dz * obs.sinT;
                    const lz = dx * obs.sinT + dz * obs.cosT;
                    if (Math.abs(lx) < obs.hx + PR &&
                        Math.abs(lz) < obs.hz + PR) return true;
                } else {
                    const b = obs.box;
                    if (hy <= b.min.y || fy >= b.max.y) continue;
                    if (tx > b.min.x - PR && tx < b.max.x + PR &&
                        tz > b.min.z - PR && tz < b.max.z + PR) return true;
                }

            moonHalo.material.opacity = Math.min(1, _palOut.moonOp * _palOut.moonOp * 1.6);

            // Lantern: at night it's genuinely your light source. The knot
            // itself stays the original subtle brightness — over-cooking
            // its emissive just makes it look like a disco ball and doesn't
            // actually illuminate the ground. Instead we push the
            // PointLight's DISTANCE hard, so the inverse-square falloff
            // reaches much further across the terrain.
            const nightness = 1.0 - smoothstepTOD(-0.05, 0.25, elev);
            const baseLantern = 40000 + nightness * 220000;
            const flicker = Math.random() * (3000 + nightness * 12000) - (1500 + nightness * 6000);
            lanternLight.intensity = baseLantern + flicker;
            lanternLight.distance  = 6000 + nightness * 16000;   // up to ~22000 units at full night
            lanternCore.material.emissiveIntensity = 8 + nightness * 22;

            // Sun disc shrinks when high in the sky (real atmospheres make
            // the sun *look* bigger near the horizon for optical/illusion
            // reasons — matching that feel reads as "overhead sun is
            // smaller" without actually touching horizon sizing).
            // elev = 0 → 1.00x scale, elev = 1 (noon) → 0.70x.
            const sunScale = 1.0 - Math.max(0, elev) * 0.30;
            sunMesh.scale.set(sunScale, sunScale, 1);
        }

        
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Update Shader Times
            moteMat.uniforms.uTime.value = time;
            // Fan uTime to every per-tower monolith material (each tower
            // has its own instance with unique color uniforms).
            for (let i = 0; i < monolithMats.length; i++) {
                monolithMats[i].uniforms.uTime.value = time;
            }

            // Advance day/night cycle (sun direction, sky, lights, fog, haze)
            updateTimeOfDay(time);

          if (controls.isLocked) {
                // --- INPUT DIRECTION (normalized-ish: -1 / 0 / +1 per axis) ---
                let inFwd = 0, inStrafe = 0;
                if (keys.w || keys.arrowup)    inFwd    += 1;
                if (keys.s || keys.arrowdown)  inFwd    -= 1;
                if (keys.d || keys.arrowright) inStrafe += 1;
                if (keys.a || keys.arrowleft)  inStrafe -= 1;

                // --- CAMERA-RELATIVE HORIZONTAL AXES ---
                // We accelerate along the direction the camera is actually
                // facing, projected to the ground plane.
                camera.getWorldDirection(_fwd);
                _fwd.y = 0;
                if (_fwd.lengthSq() > 1e-6) _fwd.normalize();
                _right.crossVectors(_fwd, _worldUp).normalize();

                // --- PROJECT CURRENT VELOCITY ONTO THOSE AXES ---
                let curFwd    = moveVel.dot(_fwd);
                let curStrafe = moveVel.dot(_right);

                // --- TARGET SPEEDS (asymmetric: fwd > back > strafe) ---
                const targetFwd    = inFwd > 0 ? inFwd * MAX_FORWARD_SPEED
                                  : inFwd < 0 ? inFwd * MAX_BACKWARD_SPEED
                                  : 0;
                const targetStrafe = inStrafe * MAX_STRAFE_SPEED;

                // --- ACCELERATE EACH AXIS SEPARATELY ---
                // If the player is holding a direction, use the accel for
                // that axis; otherwise use the higher decel rate so you
                // actually slow down. Air control lowers both.
                const airMul      = isGrounded ? 1.0 : AIR_CONTROL;
                const accelFwd    = (inFwd    !== 0 ? GROUND_ACCEL_FWD    : GROUND_DECEL) * airMul;
                const accelStrafe = (inStrafe !== 0 ? GROUND_ACCEL_STRAFE : GROUND_DECEL) * airMul;

                curFwd    = approach(curFwd,    targetFwd,    accelFwd    * delta);
                curStrafe = approach(curStrafe, targetStrafe, accelStrafe * delta);

                // --- REBUILD WORLD-SPACE VELOCITY ---
                moveVel.set(0, 0, 0);
                moveVel.addScaledVector(_fwd,   curFwd);
                moveVel.addScaledVector(_right, curStrafe);

                const oldX = camera.position.x;
                const oldZ = camera.position.z;
                camera.position.x += moveVel.x * delta;
                camera.position.z += moveVel.z * delta;

                // --- COLLISION: per-axis resolution enables wall sliding ---
                // Killing the velocity component on a blocked axis stops the
                // player from "pressing into" a wall and storing up speed.
                if (collidesAt(camera.position.x, oldZ)) {
                    camera.position.x = oldX;
                    moveVel.x = 0;
                }
                if (collidesAt(camera.position.x, camera.position.z)) {
                    camera.position.z = oldZ;
                    moveVel.z = 0;
                }

                // Floor — terrain plus any surface we're standing on top of
                let currentFloorY = getElevation(camera.position.x, camera.position.z) + USER_HEIGHT;
                const feetY = camera.position.y - USER_HEIGHT;

                for (const obs of obstacles) {
                    if (obs.type === 'cylinder') {
                        const dx = camera.position.x - obs.cx, dz = camera.position.z - obs.cz;
                        if (dx*dx + dz*dz < (obs.r + PR) * (obs.r + PR)) {
                            if (feetY >= obs.maxY - 5 && feetY <= obs.maxY + 200)
                                currentFloorY = Math.max(currentFloorY, obs.maxY + USER_HEIGHT);
                        }
                    } else if (obs.type === 'ellipsoid') {
                        // Use the precomputed AABB for floor detection — it correctly accounts
                        // for rotation and scale, unlike the local-space math which was double-scaling.
                        const b = obs.aabb;
                        const topY = b.max.y;
                        // Check player is horizontally over the rock (with a little padding)
                        if (camera.position.x > b.min.x - PR && camera.position.x < b.max.x + PR &&
                            camera.position.z > b.min.z - PR && camera.position.z < b.max.z + PR) {
                            // Accept a wide vertical window so fast-falling frames don't tunnel through
                            if (feetY <= topY + 500 && feetY >= topY - 120)
                                currentFloorY = Math.max(currentFloorY, topY + USER_HEIGHT);
                        }
                    } else if (obs.type === 'obb') {
                        // OBB-local XZ test for "is the player standing over
                        // the rock's footprint", then world-Y test for the
                        // top surface (Y-only rotation means world top ==
                        // OBB top).
                        const dx = camera.position.x - obs.cx;
                        const dz = camera.position.z - obs.cz;
                        const lx = dx * obs.cosT - dz * obs.sinT;
                        const lz = dx * obs.sinT + dz * obs.cosT;
                        if (Math.abs(lx) < obs.hx + PR &&
                            Math.abs(lz) < obs.hz + PR) {
                            if (feetY >= obs.maxY - 5 && feetY <= obs.maxY + 200)
                                currentFloorY = Math.max(currentFloorY, obs.maxY + USER_HEIGHT);
                        }
                    } else {
                        const b = obs.box;
                        if (camera.position.x > b.min.x - PR && camera.position.x < b.max.x + PR &&
                            camera.position.z > b.min.z - PR && camera.position.z < b.max.z + PR) {
                            if (feetY >= b.max.y - 5 && feetY <= b.max.y + 200)
                                currentFloorY = Math.max(currentFloorY, b.max.y + USER_HEIGHT);
                        }
                    }
                }
                // --- JUMP (coyote + double) + GRAVITY ---
                // Edge-detect spacebar so one press = one jump attempt,
                // even if the key stays held.
                const jumpPressed = !!keys[" "] && !jumpHeldLastFrame;
                jumpHeldLastFrame = !!keys[" "];

                // Coyote timer always counts down; the floor check below
                // refreshes it whenever the player is actually grounded.
                if (coyoteTimer > 0) coyoteTimer -= delta;

                if (jumpPressed) {
                    if (isGrounded || coyoteTimer > 0) {
                        // Ground jump OR coyote-time jump (just ran off a
                        // ledge within 0.3s). Keep the air-jump available.
                        verticalVelocity   = JUMP_VELOCITY;
                        isGrounded         = false;
                        coyoteTimer        = 0;
                        airJumpsRemaining  = MAX_AIR_JUMPS;
                    } else if (airJumpsRemaining > 0) {
                        // Double jump. Reset vertical velocity so a jump
                        // mid-fall still gives full lift (classic platformer
                        // feel), don't just add to current velocity.
                        verticalVelocity   = DOUBLE_JUMP_VELOCITY;
                        airJumpsRemaining -= 1;
                    }
                }

                verticalVelocity -= 2600 * delta;
                camera.position.y += verticalVelocity * delta;

                if (camera.position.y <= currentFloorY) {
                    camera.position.y = currentFloorY;
                    if (verticalVelocity < 0) verticalVelocity = 0;
                    isGrounded        = true;
                    coyoteTimer       = COYOTE_DURATION;   // refresh while grounded
                    airJumpsRemaining = MAX_AIR_JUMPS;     // refresh while grounded
                } else {
                    isGrounded = false;
                }
                
                // Update Sun/Moon
                const sDist = 35000;
                sunMesh.position.set(camera.position.x + (SUN_DIR.x * sDist), camera.position.y + (SUN_DIR.y * sDist), camera.position.z + (SUN_DIR.z * sDist));
                sunMesh.lookAt(camera.position);
                moon.position.set(camera.position.x - (SUN_DIR.x * sDist), camera.position.y - (SUN_DIR.y * sDist), camera.position.z - (SUN_DIR.z * sDist));
                moonHalo.position.copy(moon.position);
                // Aim the directional light at whichever of sun/moon is
                // currently above the horizon. Without this swap, "moonlight"
                // at night was a directional light coming from BELOW the
                // ground (since the directional light just tracked the sun)
                // — which contributed essentially nothing to the lit side
                // of objects, making night feel pitch black even with the
                // night-palette intensity boost. Now the light actually
                // comes from above all night long.
                if (SUN_DIR.y >= 0) {
                    sunLight.position.copy(sunMesh.position);
                } else {
                    sunLight.position.copy(moon.position);
                }
                sunLight.target.position.set(camera.position.x, 0, camera.position.z);
            }

            lanternCore.rotation.x = time * 0.5; 
            lanternCore.rotation.y = time * 0.3;
            
            const tP = new THREE.Vector3(
                camera.position.x + Math.cos(time * 0.6) * 150, 
                camera.position.y + (Math.sin(time * 1.5) * 20) + 80, 
                camera.position.z + Math.sin(time * 0.6) * 150
            );
            lanternGroup.position.lerp(tP, 0.04); 
            // lanternLight.intensity is driven by updateTimeOfDay (with flicker + night boost)

            skyMesh.position.copy(camera.position);
            hazeMesh.position.copy(camera.position);

            // Drift clouds with wind + age them through their fade
            // in/live/fade out lifecycle. The function is registered
            // asynchronously after the GLB loads, hence the guard.
            if (window.cloudsTick) window.cloudsTick(delta);

            renderer.render(scene, camera);

            scene.traverse(obj => {
                if (!obj.isMesh) return;
                if (obj.userData.isMonolith) {
                    // The five towers themselves — slow Y-spin.
                    obj.rotation.y += delta * (obj.userData.rotSpeed || 0.05);
                } else if (obj.userData.isMonolithCrystal) {
                    // Floating reward crystals on each tower top. Per-crystal
                    // bob seed and spin speed (set at spawn) keep the 5
                    // crystals out of phase with each other.
                    obj.rotation.y += delta * obj.userData.spinSpeed;
                    obj.rotation.x += delta * obj.userData.spinSpeed * 0.4;
                    obj.position.y =
                        obj.userData.crystalBaseY +
                        Math.sin(time * 1.1 + obj.userData.bobSeed) * 35;
                }
            });
        }

      
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth / PIXEL_SCALE, window.innerHeight / PIXEL_SCALE, false); });

        // Hide the WASD instructions after 60 seconds (60000 milliseconds)
        setTimeout(() => {
            const instructions = document.getElementById('ui');
            if (instructions) {
                instructions.style.transition = "opacity 2s ease-in-out";
                instructions.style.opacity = "0";
                
                // Optional: fully remove from layout after fade is done
                setTimeout(() => {
                    instructions.style.display = "none";
                }, 2000);
            }
        }, 45000);

    </script>
</body>
</html>
